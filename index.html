  const inputX = canvas.width / 2;
  const inputY = joinY + 45;
  syncLobbyInputPosition(inputX, inputY);
  if (!lobbyInputActive) drawJoinCodeBox(inputX, inputY);

  makeLobbyButton("JOIN CODE", canvas.width / 2 - 110, inputY + 56, 220, 46, tryJoinRoom, "weapon");

  ctx.fillStyle = "rgba(255,255,255,0.055)";
  roundRect(panelX + 70, panelY + panelH - 112, panelW - 140, 56, 14);
  ctx.fill();
  ctx.strokeStyle = "rgba(139,238,255,0.25)";
  ctx.stroke();
  ctx.fillStyle = "#ffcf6d";
  ctx.font = "14px Arial";
  wrapText(lobbyMessage, panelX + 95, panelY + panelH - 78, panelW - 190, 18);

  for (let button of lobbyButtons) drawButton(button);

  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(232,251,255,0.75)";
  ctx.font = "13px Arial";
  ctx.fillText("Crosshair skins are now in their own menu button.", canvas.width / 2, panelY + panelH - 18);

  drawMenuCursor();
}

function wrapText(text, x, y, maxWidth, lineHeight) {
  const words = String(text).split(" ");
  let line = "";
  ctx.textAlign = "left";
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + " ";
    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + " ";
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}


function drawJoinCodeBox(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = "rgba(0, 12, 25, 0.96)";
  ctx.strokeStyle = "#00e5ff";
  ctx.lineWidth = 2;
  ctx.shadowColor = "#00e5ff";
  ctx.shadowBlur = 10;
  roundRect(-135, -26, 270, 52, 12);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = joinCode ? "#ffd34d" : "rgba(255,255,255,0.45)";
  ctx.font = "bold 26px Arial";
  ctx.fillText(joinCode || "CLICK TO TYPE", 0, 1);
  ctx.restore();
}

function drawCrosshairPreview(x, y) {
  const color = getCrosshairColor();
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(x, y, 10, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - 20, y); ctx.lineTo(x - 6, y);
  ctx.moveTo(x + 6, y); ctx.lineTo(x + 20, y);
  ctx.moveTo(x, y - 20); ctx.lineTo(x, y - 6);
  ctx.moveTo(x, y + 6); ctx.lineTo(x, y + 20);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPauseScreen() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "60px Arial";
  ctx.fillText("PAUSED", canvas.width / 2 - 120, canvas.height / 2);
  ctx.font = "24px Arial";
  ctx.fillText("Press P to continue", canvas.width / 2 - 105, canvas.height / 2 + 45);
}

function drawGame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!paused) {
    updatePlayer();
    updateSidekicks();
    updateBullets();
    updateEnemies();
    updateCoins();
    updateHealthPacks();
    updateEffects();
    checkCollisions();
    updateOperationMission();
    if (mobileFireHeld) touchShootAutoAim();

    if (gameState === "playing" && Date.now() - lastAutoSaveTime > 10000) {
      saveGame(false);
      lastAutoSaveTime = Date.now();
    }
  }

  ctx.save();
  if (screenShakeTimer > 0) {
    const shakeX = (Math.random() - 0.5) * screenShakePower * 2;
    const shakeY = (Math.random() - 0.5) * screenShakePower * 2;
    ctx.translate(shakeX, shakeY);
  }

  drawBackground();
  drawCoins();
  drawHealthPacks();
  drawPlayer();
  drawSidekicks();
  drawEnemies();
  drawBullets();
  drawEffects();
  drawPlayerHealthMeter();
  ctx.restore();

  drawUI();
  drawOperationHUD();
  drawQuitButton();
  drawRadar();
  drawBossWarning();
  drawCrosshair();
  drawSaveMessage();
  drawTouchControls();

  if (paused) drawPauseScreen();
}



// -----------------------------
// SAFE 2.5D MODE
// -----------------------------
let mode25DActive = false;
let mode25DCameraX = 0;
let mode25DCameraY = 0;
let mode25DLastTime = performance.now();
let mode25DShopOpen = false;

const mode25D = {
  worldW: 3400,
  worldH: 3400,
  player: null,
  bullets: [],
  enemyBullets: [],
  enemies: [],
  chests: [],
  coins: [],
  stones: [],
  floating: [],
  damageLevel: 1,
  reloadLevel: 1,
  healthLevel: 1
};

function enterMode25D() {
  hideLobbyInput();
  mode25DActive = true;
  gameState = "mode25d";
  resetMode25D();
}

function resetMode25D() {
  mode25D.player = {
    x: mode25D.worldW / 2,
    y: mode25D.worldH / 2,
    size: 36,
    hp: 100 + (mode25D.healthLevel - 1) * 25,
    maxHp: 100 + (mode25D.healthLevel - 1) * 25,
    coins: 0,
    chests: 0,
    shootCooldown: 0
  };

  mode25D.bullets.length = 0;
  mode25D.enemyBullets.length = 0;
  mode25D.enemies.length = 0;
  mode25D.chests.length = 0;
  mode25D.coins.length = 0;
  mode25D.stones.length = 0;
  mode25D.floating.length = 0;
  mode25DShopOpen = false;

  buildMode25DWorld();
  mode25DLastTime = performance.now();
}

function buildMode25DWorld() {
  const fixed = [
    [340,340,210,100],[760,520,160,300],[1360,430,300,115],[2380,420,370,115],
    [420,1260,410,110],[940,1510,125,350],[1600,1350,460,120],[2580,1360,140,380],
    [500,2380,440,125],[1250,2500,150,400],[2080,2360,440,125],[2860,2540,155,380],
    [1680,1800,310,260]
  ];

  for (const s of fixed) mode25D.stones.push({ x:s[0], y:s[1], w:s[2], h:s[3] });

  for (let i = 0; i < 22; i++) {
    mode25D.stones.push({
      x: 180 + Math.random() * (mode25D.worldW - 460),
      y: 180 + Math.random() * (mode25D.worldH - 460),
      w: 80 + Math.random() * 170,
      h: 70 + Math.random() * 140
    });
  }

  const chestSpots = [
    [260,280],
    [mode25D.worldW - 360,330],
    [430,mode25D.worldH - 420],
    [mode25D.worldW - 460,mode25D.worldH - 430],
    [mode25D.worldW / 2 + 520,mode25D.worldH / 2 - 470],
    [mode25D.worldW / 2 - 630,mode25D.worldH / 2 + 540]
  ];

  chestSpots.forEach((p,i) => {
    const chest = { x:p[0], y:p[1], size:46, value:500+i*275, opened:false };
    mode25D.chests.push(chest);
    for (let g = 0; g < 2; g++) {
      const a = g * Math.PI + .65;
      spawnMode25DEnemy(chest.x + Math.cos(a)*170, chest.y + Math.sin(a)*170, "guard", chest);
    }
  });

  let attempts = 0;
  while (mode25D.enemies.filter(e => !e.guardChest).length < 8 && attempts < 400) {
    attempts++;
    const x = 330 + Math.random() * (mode25D.worldW - 660);
    const y = 330 + Math.random() * (mode25D.worldH - 660);
    if (mode25DDist(x,y,mode25D.player.x,mode25D.player.y) < 560) continue;
    if (mode25D.enemies.some(e => mode25DDist(x,y,e.x,e.y) < 270)) continue;
    if (mode25DHitStone(x,y,48,48)) continue;
    spawnMode25DEnemy(x,y,mode25D.enemies.length % 4 === 0 ? "sniper" : "soldier");
  }
}

function spawnMode25DEnemy(x, y, type = "soldier", guardChest = null) {
  mode25D.enemies.push({
    x, y, type, guardChest,
    size: type === "sniper" ? 34 : 38,
    hp: type === "guard" ? 6 : type === "sniper" ? 4 : 5,
    maxHp: type === "guard" ? 6 : type === "sniper" ? 4 : 5,
    speed: type === "sniper" ? 55 : type === "guard" ? 65 : 78,
    shootTimer: .8 + Math.random() * 1.5,
    flash: 0
  });
}

function mode25DDist(x1,y1,x2,y2) {
  return Math.hypot(x2-x1, y2-y1);
}

function mode25DRectHit(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function mode25DHitStone(cx,cy,w,h) {
  return mode25D.stones.some(s => mode25DRectHit(cx-w/2, cy-h/2, w, h, s.x, s.y, s.w, s.h));
}

function mode25DSpend(cost) {
  if (mode25D.player.coins < cost) return false;
  mode25D.player.coins -= cost;
  return true;
}

function mode25DBuy(kind) {
  if (kind === "damage") {
    const cost = 200 * mode25D.damageLevel;
    if (mode25DSpend(cost)) mode25D.damageLevel++;
  }
  if (kind === "reload") {
    const cost = 250 * mode25D.reloadLevel;
    if (mode25DSpend(cost)) mode25D.reloadLevel++;
  }
  if (kind === "health") {
    const cost = 300 * mode25D.healthLevel;
    if (mode25DSpend(cost)) {
      mode25D.healthLevel++;
      mode25D.player.maxHp += 25;
      mode25D.player.hp += 25;
    }
  }
  if (kind === "heal") {
    if (mode25DSpend(100)) mode25D.player.hp = mode25D.player.maxHp;
  }
}

function mode25DShoot() {
  const p = mode25D.player;
  if (!p || p.hp <= 0 || p.shootCooldown > 0 || mode25DShopOpen) return;

  p.shootCooldown = Math.max(.07, .20 - mode25D.reloadLevel * .018);
  const wx = mouseX + mode25DCameraX;
  const wy = mouseY + mode25DCameraY;
  const a = Math.atan2(wy - p.y, wx - p.x);

  mode25D.bullets.push({
    x: p.x,
    y: p.y,
    dx: Math.cos(a) * 920,
    dy: Math.sin(a) * 920,
    life: .75,
    trail: []
  });
}

function updateMode25D(dt) {
  const p = mode25D.player;
  if (!p || mode25DShopOpen || p.hp <= 0) return;

  if (p.shootCooldown > 0) p.shootCooldown -= dt;

  let mx = 0, my = 0;
  if (keys["w"] || keys["W"] || keys["arrowup"] || keys["ArrowUp"]) my -= 1;
  if (keys["s"] || keys["S"] || keys["arrowdown"] || keys["ArrowDown"]) my += 1;
  if (keys["a"] || keys["A"] || keys["arrowleft"] || keys["ArrowLeft"]) mx -= 1;
  if (keys["d"] || keys["D"] || keys["arrowright"] || keys["ArrowRight"]) mx += 1;

  const len = Math.hypot(mx,my);
  if (len > 0) {
    const sp = (keys["shift"] ? 390 : 255) * dt;
    moveMode25DPlayer(mx/len*sp, my/len*sp);
  }

  updateMode25DBullets(dt);
  updateMode25DEnemies(dt);
  updateMode25DPickups();
  updateMode25DFloating(dt);
  updateMode25DCamera();
}

function moveMode25DPlayer(mx,my) {
  const p = mode25D.player;
  const nx = Math.max(20, Math.min(mode25D.worldW-20, p.x+mx));
  const ny = Math.max(20, Math.min(mode25D.worldH-20, p.y+my));

  if (!mode25DHitStone(nx,p.y,p.size,p.size)) p.x = nx;
  if (!mode25DHitStone(p.x,ny,p.size,p.size)) p.y = ny;
}

function updateMode25DBullets(dt) {
  for (let i = mode25D.bullets.length - 1; i >= 0; i--) {
    const b = mode25D.bullets[i];
    b.trail.push({ x:b.x, y:b.y });
    if (b.trail.length > 6) b.trail.shift();

    b.x += b.dx * dt;
    b.y += b.dy * dt;
    b.life -= dt;

    for (const s of mode25D.stones) {
      if (mode25DRectHit(b.x,b.y,5,5,s.x,s.y,s.w,s.h)) b.life = 0;
    }

    for (const e of mode25D.enemies) {
      if (e.hp > 0 && mode25DDist(b.x,b.y,e.x,e.y) < e.size*.72) {
        e.hp -= mode25D.damageLevel;
        e.flash = .12;
        mode25D.floating.push({ text:"HIT", x:e.x, y:e.y-38, life:.45 });
        b.life = 0;
        if (e.hp <= 0) {
          const value = e.type === "guard" ? 100 : 60;
          mode25D.coins.push({ x:e.x, y:e.y, value, size:16 });
          mode25D.floating.push({ text:"+"+value, x:e.x, y:e.y-20, life:.8 });
        }
        break;
      }
    }

    if (b.life <= 0) mode25D.bullets.splice(i,1);
  }

  for (let i = mode25D.enemyBullets.length - 1; i >= 0; i--) {
    const b = mode25D.enemyBullets[i];
    b.trail.push({ x:b.x, y:b.y });
    if (b.trail.length > 8) b.trail.shift();

    b.x += b.dx * dt;
    b.y += b.dy * dt;
    b.life -= dt;

    for (const s of mode25D.stones) {
      if (mode25DRectHit(b.x,b.y,5,5,s.x,s.y,s.w,s.h)) b.life = 0;
    }

    if (mode25DDist(b.x,b.y,mode25D.player.x,mode25D.player.y) < mode25D.player.size*.65) {
      mode25D.player.hp -= b.damage;
      mode25D.floating.push({ text:"-"+Math.round(b.damage), x:mode25D.player.x, y:mode25D.player.y-36, life:.55 });
      b.life = 0;
    }

    if (b.life <= 0) mode25D.enemyBullets.splice(i,1);
  }
}

function updateMode25DEnemies(dt) {
  const p = mode25D.player;
  for (const e of mode25D.enemies) {
    if (e.hp <= 0) continue;
    if (e.flash > 0) e.flash -= dt;

    let tx = p.x, ty = p.y;
    if (e.guardChest && !e.guardChest.opened && mode25DDist(p.x,p.y,e.guardChest.x,e.guardChest.y) > 430) {
      tx = e.guardChest.x;
      ty = e.guardChest.y;
    }

    const d = mode25DDist(e.x,e.y,tx,ty);
    const ideal = e.type === "sniper" ? 430 : e.type === "guard" ? 290 : 320;

    if (d > ideal + 55) tryMoveMode25DEnemy(e,(tx-e.x)/d*e.speed*dt,(ty-e.y)/d*e.speed*dt);
    else if (d < ideal - 95) tryMoveMode25DEnemy(e,-(tx-e.x)/d*e.speed*.55*dt,-(ty-e.y)/d*e.speed*.55*dt);

    for (const o of mode25D.enemies) {
      if (o === e || o.hp <= 0) continue;
      const dd = mode25DDist(e.x,e.y,o.x,o.y);
      if (dd < 105 && dd > 0) {
        e.x += (e.x-o.x)/dd * 40 * dt;
        e.y += (e.y-o.y)/dd * 40 * dt;
      }
    }

    e.shootTimer -= dt;
    const pd = mode25DDist(e.x,e.y,p.x,p.y);
    if (pd < 760 && e.shootTimer <= 0) {
      e.shootTimer = e.type === "sniper" ? 2.2 : e.type === "guard" ? 1.35 : 1.7;
      mode25DEnemyShoot(e);
    }
  }
}

function tryMoveMode25DEnemy(e,mx,my) {
  if (!mode25DHitStone(e.x+mx,e.y,e.size,e.size)) e.x += mx;
  if (!mode25DHitStone(e.x,e.y+my,e.size,e.size)) e.y += my;
  e.x = Math.max(20, Math.min(mode25D.worldW-20, e.x));
  e.y = Math.max(20, Math.min(mode25D.worldH-20, e.y));
}

function mode25DEnemyShoot(e) {
  const a = Math.atan2(mode25D.player.y-e.y, mode25D.player.x-e.x) + (Math.random()-.5)*(e.type==="sniper"?.05:.16);
  mode25D.enemyBullets.push({
    x:e.x,
    y:e.y,
    dx:Math.cos(a)*(e.type==="sniper"?620:470),
    dy:Math.sin(a)*(e.type==="sniper"?620:470),
    damage:e.type==="sniper"?16:e.type==="guard"?10:8,
    life:1.8,
    trail:[]
  });
  mode25D.floating.push({ text:"BANG!", x:e.x, y:e.y-44, life:.32 });
}

function updateMode25DPickups() {
  const p = mode25D.player;
  for (const c of mode25D.chests) {
    if (!c.opened && mode25DDist(p.x,p.y,c.x,c.y) < 65) {
      c.opened = true;
      p.chests++;
      p.coins += c.value;
      mode25D.floating.push({ text:"CHEST +"+c.value, x:c.x, y:c.y-45, life:1.2 });
      for (let i=0; i<7; i++) mode25D.coins.push({ x:c.x+Math.random()*90-45, y:c.y+Math.random()*90-45, value:25, size:15 });
    }
  }

  for (let i = mode25D.coins.length - 1; i >= 0; i--) {
    const c = mode25D.coins[i];
    if (mode25DDist(p.x,p.y,c.x,c.y) < 52) {
      p.coins += c.value;
      mode25D.floating.push({ text:"+"+c.value, x:c.x, y:c.y-20, life:.7 });
      mode25D.coins.splice(i,1);
    }
  }
}

function updateMode25DFloating(dt) {
  for (let i = mode25D.floating.length - 1; i >= 0; i--) {
    mode25D.floating[i].y -= 45 * dt;
    mode25D.floating[i].life -= dt;
    if (mode25D.floating[i].life <= 0) mode25D.floating.splice(i,1);
  }
}

function updateMode25DCamera() {
  mode25DCameraX = Math.max(0, Math.min(mode25D.worldW-canvas.width, mode25D.player.x-canvas.width/2));
  mode25DCameraY = Math.max(0, Math.min(mode25D.worldH-canvas.height, mode25D.player.y-canvas.height/2));
}

function mode25DSX(x) { return x - mode25DCameraX; }
function mode25DSY(y) { return y - mode25DCameraY; }


function drawQuitScreen() {
  ctx.fillStyle = "#05070a";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#e8fbff";
  ctx.font = "bold 38px Arial";
  ctx.textAlign = "center";
  ctx.fillText("Thanks for playing SKYFALL", canvas.width/2, canvas.height/2 - 20);
  ctx.font = "18px Arial";
  ctx.fillText("Refresh the page to return.", canvas.width/2, canvas.height/2 + 25);
}

function drawMode25D() {
  const now = performance.now();
  const dt = Math.min(.033, (now - mode25DLastTime) / 1000 || .016);
  mode25DLastTime = now;

  updateMode25D(dt);

  drawMode25DBackground();
  drawMode25DWorldObjects();
  drawMode25DBullets();
  drawMode25DEnemies();
  drawMode25DPlayer();
  drawMode25DFloating();
  drawMode25DCrosshair();
  drawMode25DShop();
  drawMode25DMiniMap();
  drawMode25DStats();

  if (mode25D.player.hp <= 0) {
    ctx.fillStyle = "rgba(0,0,0,.72)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#ff3333";
    ctx.font = "bold 64px Arial";
    ctx.textAlign = "center";
    ctx.fillText("YOU DIED",canvas.width/2,canvas.height/2);
    ctx.font = "22px Arial";
    ctx.fillStyle = "white";
    ctx.fillText("Press R to restart or Q for main menu",canvas.width/2,canvas.height/2+44);
  }

  drawMode25DInstructions();
}

function drawMode25DBackground() {
  const g = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  g.addColorStop(0,"#315b38");
  g.addColorStop(.55,"#21452a");
  g.addColorStop(1,"#102817");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "rgba(255,255,255,.045)";
  ctx.lineWidth = 1;
  const grid = 90;

  for (let x = -mode25DCameraX % grid; x < canvas.width; x += grid) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for (let y = -mode25DCameraY % grid; y < canvas.height; y += grid) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }

  const v = ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*.1,canvas.width/2,canvas.height/2,canvas.width*.72);
  v.addColorStop(0,"rgba(0,0,0,0)");
  v.addColorStop(1,"rgba(0,0,0,.32)");
  ctx.fillStyle = v;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawMode25DWorldObjects() {
  const items = [
    ...mode25D.stones.map(s => ({...s,kind:"stone"})),
    ...mode25D.chests.map(c => ({x:c.x-23,y:c.y-23,w:46,h:46,kind:"chest",opened:c.opened}))
  ].sort((a,b)=>(a.y+a.h)-(b.y+b.h));

  for (const o of items) {
    if (mode25DSX(o.x+o.w)<-120 || mode25DSX(o.x)>canvas.width+120 || mode25DSY(o.y+o.h)<-120 || mode25DSY(o.y)>canvas.height+120) continue;
    if (o.kind === "stone") drawMode25DStone(o);
    else drawMode25DChest(o);
  }

  for (const c of mode25D.coins) drawMode25DCoin(c);
}

function drawMode25DBox(x,y,w,h,front,side,top,depth=12) {
  ctx.fillStyle = "rgba(0,0,0,.34)";
  ctx.beginPath();
  ctx.ellipse(x+w/2+depth,y+h+depth*.6,w*.45,h*.18,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = side;
  ctx.beginPath();
  ctx.moveTo(x+w,y);
  ctx.lineTo(x+w+depth,y-depth*.7);
  ctx.lineTo(x+w+depth,y+h-depth*.7);
  ctx.lineTo(x+w,y+h);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = top;
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x+depth,y-depth*.7);
  ctx.lineTo(x+w+depth,y-depth*.7);
  ctx.lineTo(x+w,y);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = front;
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle = "rgba(0,0,0,.35)";
  ctx.strokeRect(x,y,w,h);
}

function drawMode25DStone(s) {
  drawMode25DBox(mode25DSX(s.x),mode25DSY(s.y),s.w,s.h,"#666","#444","#999",18);
}

function drawMode25DChest(c) {
  const x = mode25DSX(c.x), y = mode25DSY(c.y);
  drawMode25DBox(x,y,46,46,c.opened?"#5a3211":"#a86a1f","#5a3a12",c.opened?"#777":"#d69b3a",14);
  ctx.fillStyle = "#ffd34d";
  ctx.fillRect(x+20,y,6,46);
  ctx.fillRect(x+7,y+24,32,6);
}

function drawMode25DCoin(c) {
  const x = mode25DSX(c.x), y = mode25DSY(c.y);
  ctx.fillStyle = "rgba(0,0,0,.28)";
  ctx.beginPath(); ctx.ellipse(x+5,y+8,c.size,c.size*.35,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = "#ffd700";
  ctx.beginPath(); ctx.ellipse(x,y,c.size*.75,c.size,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#fff1a8";
  ctx.stroke();
}

function drawMode25DBullets() {
  for (const b of mode25D.bullets) drawMode25DTracer(b,"#ffff33",4,false);
  for (const b of mode25D.enemyBullets) drawMode25DTracer(b,"#ff3300",7,true);
}

function drawMode25DTracer(b,color,width,enemy) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = enemy ? 26 : 18;
  ctx.lineWidth = width;
  ctx.beginPath();
  const start = b.trail[0] || b;
  ctx.moveTo(mode25DSX(start.x),mode25DSY(start.y));
  ctx.lineTo(mode25DSX(b.x),mode25DSY(b.y));
  ctx.stroke();

  if (enemy) {
    ctx.fillStyle = "#ffcc66";
    ctx.beginPath();
    ctx.arc(mode25DSX(b.x),mode25DSY(b.y),6,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawMode25DEnemies() {
  const live = mode25D.enemies.filter(e => e.hp > 0).sort((a,b)=>a.y-b.y);

  for (const e of live) {
    const x = mode25DSX(e.x), y = mode25DSY(e.y);
    if (x<-120 || x>canvas.width+120 || y<-120 || y>canvas.height+120) continue;

    ctx.fillStyle = "rgba(0,0,0,.40)";
    ctx.beginPath();
    ctx.ellipse(x+8,y+24,e.size*.7,e.size*.23,0,0,Math.PI*2);
    ctx.fill();

    const front = e.flash>0 ? "#fff" : e.type==="guard" ? "#d6a441" : e.type==="sniper" ? "#111" : "#b92727";
    const side = e.type==="guard" ? "#7a5418" : e.type==="sniper" ? "#000" : "#611313";
    const top = e.type==="guard" ? "#fff1a8" : e.type==="sniper" ? "#666" : "#ff7777";

    drawMode25DBox(x-e.size/2,y-e.size/2,e.size,e.size,front,side,top,10);
    drawMode25DBox(x-e.size*.25,y-e.size*.88,e.size*.5,e.size*.32,front,side,top,7);

    const a = Math.atan2(mode25D.player.y-e.y,mode25D.player.x-e.x);
    ctx.strokeStyle = "#151515";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+Math.cos(a)*35,y+Math.sin(a)*35);
    ctx.stroke();

    ctx.strokeStyle = "#666";
    ctx.lineWidth = 2;
    ctx.stroke();

    if (e.type === "sniper") {
      ctx.strokeStyle = "#ff2222";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.lineTo(x+Math.cos(a)*75,y+Math.sin(a)*75);
      ctx.stroke();
    }

    ctx.fillStyle = "rgba(0,0,0,.6)";
    ctx.fillRect(x-24,y-e.size*.95,48,6);
    ctx.fillStyle = "#ff3333";
    ctx.fillRect(x-24,y-e.size*.95,48*(e.hp/e.maxHp),6);
  }
}

function drawMode25DPlayer() {
  const p = mode25D.player;
  const x = mode25DSX(p.x), y = mode25DSY(p.y);

  ctx.fillStyle = "rgba(0,0,0,.45)";
  ctx.beginPath();
  ctx.ellipse(x+8,y+24,28,10,0,0,Math.PI*2);
  ctx.fill();

  drawMode25DBox(x-p.size/2,y-p.size/2,p.size,p.size,"#008cff","#004a9f","#8ee8ff",10);

  const wx = mouseX + mode25DCameraX;
  const wy = mouseY + mode25DCameraY;
  const a = Math.atan2(wy-p.y,wx-p.x);

  ctx.strokeStyle = "#111";
  ctx.lineWidth = 7;
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x+Math.cos(a)*38,y+Math.sin(a)*38);
  ctx.stroke();

  ctx.strokeStyle = "#00d5ff";
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawMode25DFloating() {
  for (const f of mode25D.floating) {
    ctx.globalAlpha = Math.max(0,f.life);
    ctx.fillStyle = "white";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.fillText(f.text,mode25DSX(f.x),mode25DSY(f.y));
    ctx.globalAlpha = 1;
  }
}

function drawMode25DCrosshair() {
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(mouseX-10,mouseY);
  ctx.lineTo(mouseX+10,mouseY);
  ctx.moveTo(mouseX,mouseY-10);
  ctx.lineTo(mouseX,mouseY+10);
  ctx.stroke();
}

function drawMode25DMiniMap() {
  const w=150,h=150,x=canvas.width-w-15,y=15;
  ctx.fillStyle = "rgba(0,0,0,.50)";
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle = "white";
  ctx.strokeRect(x,y,w,h);

  function mx(v){return x+v/mode25D.worldW*w;}
  function my(v){return y+v/mode25D.worldH*h;}

  ctx.fillStyle = "#777";
  for (const s of mode25D.stones) ctx.fillRect(mx(s.x),my(s.y),Math.max(2,s.w/mode25D.worldW*w),Math.max(2,s.h/mode25D.worldH*h));

  ctx.fillStyle = "#00aaff";
  ctx.beginPath();
  ctx.arc(mx(mode25D.player.x),my(mode25D.player.y),4,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#ffd34d";
  for (const c of mode25D.chests) if (!c.opened) ctx.fillRect(mx(c.x)-2,my(c.y)-2,4,4);

  ctx.fillStyle = "red";
  for (const e of mode25D.enemies) if (e.hp>0) ctx.fillRect(mx(e.x)-1.5,my(e.y)-1.5,3,3);
}

function drawMode25DStats() {
  const p = mode25D.player;
  ctx.fillStyle = "rgba(0,0,0,.62)";
  ctx.fillRect(12,12,270,112);
  ctx.strokeStyle = "rgba(255,255,255,.25)";
  ctx.strokeRect(12,12,270,112);

  ctx.fillStyle = "#fff";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "left";
  ctx.fillText("SKYFALL 2.5D MODE", 24, 36);
  ctx.font = "14px Arial";
  ctx.fillText("HP: " + Math.max(0,Math.ceil(p.hp)) + "/" + p.maxHp, 24, 58);
  ctx.fillText("Coins: " + p.coins + "  Chests: " + p.chests + "/" + mode25D.chests.length, 24, 78);
  ctx.fillText("Enemies: " + mode25D.enemies.filter(e=>e.hp>0).length, 24, 98);
}

function drawMode25DShop() {
  if (!mode25DShopOpen) return;
  const p = mode25D.player;
  const x = canvas.width - 300;
  const y = 185;
  const w = 280;
  const h = 250;
  ctx.fillStyle = "rgba(0,0,0,.85)";
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle = "#70d6ff";
  ctx.lineWidth = 2;
  ctx.strokeRect(x,y,w,h);

  ctx.fillStyle = "#ffd34d";
  ctx.font = "bold 24px Arial";
  ctx.textAlign = "left";
  ctx.fillText("SHOP",x+18,y+34);

  ctx.fillStyle = "white";
  ctx.font = "15px Arial";
  ctx.fillText("Coins: " + p.coins, x+18, y+62);
  ctx.fillText("1 - Damage +1: $" + (200*mode25D.damageLevel), x+18, y+95);
  ctx.fillText("2 - Reload Faster: $" + (250*mode25D.reloadLevel), x+18, y+125);
  ctx.fillText("3 - Max Health +25: $" + (300*mode25D.healthLevel), x+18, y+155);
  ctx.fillText("4 - Heal Full: $100", x+18, y+185);
  ctx.fillText("Press O to close shop", x+18, y+220);
}

function drawMode25DInstructions() {
  ctx.fillStyle = "rgba(0,0,0,.58)";
  ctx.fillRect(12, canvas.height - 70, 430, 50);
  ctx.fillStyle = "white";
  ctx.font = "14px Arial";
  ctx.textAlign = "left";
  ctx.fillText("2.5D Controls: WASD/Arrows move • Click/Space shoot • O shop • R restart • Q main menu", 24, canvas.height - 40);
}


// -----------------------------
// PLAYABLE ORIGINAL PROJECT MODE
// -----------------------------
const originalBullets = [];
const originalEnemies = [];
const originalCoins = [];
let originalLastShot = 0;
let originalLastEnemySpawn = 0;
let originalKills = 0;
let originalCoinsTotal = 0;
let originalDamageTimer = 0;
let originalHealthLevel = 1;
let originalGunLevel = 1;

const originalPlayer = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 30,
  speed: 5,
  health: 100,
  maxHealth: 100
};

function resetOriginalGame() {
  originalBullets.length = 0;
  originalEnemies.length = 0;
  originalCoins.length = 0;
  originalPlayer.x = canvas.width / 2;
  originalPlayer.y = canvas.height / 2;
  originalPlayer.maxHealth = 100 + (originalHealthLevel - 1) * 25;
  originalPlayer.health = originalPlayer.maxHealth;
  originalKills = 0;
  originalLastShot = 0;
  originalLastEnemySpawn = Date.now();
  for (let i = 0; i < 5; i++) originalSpawnEnemy();
  gameState = "originalPlaying";
}

function originalSpawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random() * canvas.width; y = -40; }
  else if (side === 1) { x = canvas.width + 40; y = Math.random() * canvas.height; }
  else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 40; }
  else { x = -40; y = Math.random() * canvas.height; }
  originalEnemies.push({ x, y, size: 35, speed: 1.2 + Math.random() * 0.5, health: 2 });
}

function originalShoot() {
  const now = Date.now();
  if (now - originalLastShot < 350) return;
  originalLastShot = now;
  const cx = originalPlayer.x + originalPlayer.size / 2;
  const cy = originalPlayer.y + originalPlayer.size / 2;
  const angle = Math.atan2(mouseY - cy, mouseX - cx);
  originalBullets.push({ x: cx, y: cy, radius: 4, speed: 13, dx: Math.cos(angle), dy: Math.sin(angle), damage: originalGunLevel });
}

function updateOriginalPlayer() {
  if (keys["w"]) originalPlayer.y -= originalPlayer.speed;
  if (keys["s"]) originalPlayer.y += originalPlayer.speed;
  if (keys["a"]) originalPlayer.x -= originalPlayer.speed;
  if (keys["d"]) originalPlayer.x += originalPlayer.speed;
  originalPlayer.x = Math.max(0, Math.min(canvas.width - originalPlayer.size, originalPlayer.x));
  originalPlayer.y = Math.max(0, Math.min(canvas.height - originalPlayer.size, originalPlayer.y));
}

function updateOriginalGame() {
  updateOriginalPlayer();
  const now = Date.now();
  if (originalEnemies.length < 7 && now - originalLastEnemySpawn > 800) {
    originalSpawnEnemy();
    originalLastEnemySpawn = now;
  }
  for (let b of originalBullets) {
    b.x += b.dx * b.speed;
    b.y += b.dy * b.speed;
  }
  for (let i = originalBullets.length - 1; i >= 0; i--) {
    const b = originalBullets[i];
    if (b.x < -80 || b.x > canvas.width + 80 || b.y < -80 || b.y > canvas.height + 80) originalBullets.splice(i, 1);
  }
  for (let enemy of originalEnemies) {
    const dx = originalPlayer.x - enemy.x;
    const dy = originalPlayer.y - enemy.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    if (dist > 70) {
      enemy.x += (dx / dist) * enemy.speed;
      enemy.y += (dy / dist) * enemy.speed;
    }
  }

  for (let i = originalBullets.length - 1; i >= 0; i--) {
    const b = originalBullets[i];
    for (let j = originalEnemies.length - 1; j >= 0; j--) {
      const e = originalEnemies[j];
      if (b.x > e.x && b.x < e.x + e.size && b.y > e.y && b.y < e.y + e.size) {
        e.health -= b.damage;
        originalBullets.splice(i, 1);
        if (e.health <= 0) {
          originalCoins.push({ x: e.x + e.size / 2, y: e.y + e.size / 2, size: 16, value: 10 });
          originalEnemies.splice(j, 1);
          originalKills++;
        }
        break;
      }
    }
  }

  for (let i = originalCoins.length - 1; i >= 0; i--) {
    const c = originalCoins[i];
    if (originalPlayer.x < c.x + c.size && originalPlayer.x + originalPlayer.size > c.x && originalPlayer.y < c.y + c.size && originalPlayer.y + originalPlayer.size > c.y) {
      originalCoinsTotal += c.value;
      originalCoins.splice(i, 1);
    }
  }

  for (let e of originalEnemies) {
    if (originalPlayer.x < e.x + e.size && originalPlayer.x + originalPlayer.size > e.x && originalPlayer.y < e.y + e.size && originalPlayer.y + originalPlayer.size > e.y) {
      if (now - originalDamageTimer > 800) {
        originalPlayer.health -= 10;
        originalDamageTimer = now;
      }
    }
  }

  if (originalPlayer.health <= 0) gameState = "original";
}

function drawOriginalPlaying() {
  updateOriginalGame();
  ctx.fillStyle = "#3b7a3b";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "gold";
  for (let c of originalCoins) {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = "blue";
  ctx.fillRect(originalPlayer.x, originalPlayer.y, originalPlayer.size, originalPlayer.size);

  ctx.fillStyle = "red";
  for (let e of originalEnemies) {
    ctx.fillRect(e.x, e.y, e.size, e.size);
    ctx.fillStyle = "white";
    ctx.font = "15px Arial";
    ctx.textAlign = "left";
    ctx.fillText(Math.floor(e.health), e.x + 10, e.y + 21);
    ctx.fillStyle = "red";
  }

  ctx.fillStyle = "yellow";
  for (let b of originalBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = "white";
  ctx.font = "22px Arial";
  ctx.textAlign = "left";
  ctx.fillText("ORIGINAL MODE", 20, 35);
  ctx.fillText("Health: " + Math.max(0, originalPlayer.health) + "/" + originalPlayer.maxHealth, 20, 68);
  ctx.fillText("Coins: " + originalCoinsTotal, 20, 101);
  ctx.fillText("Kills: " + originalKills, 20, 134);
  ctx.font = "16px Arial";
  ctx.fillText("WASD move | Click shoot | Q back", 20, 166);

}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Hide the browser cursor only during gameplay. In the shop, force it visible.
    const playingNow = gameState === "playing";
    canvas.style.cursor = playingNow ? "none" : "auto";
    document.body.style.cursor = playingNow ? "none" : "auto";
    document.documentElement.style.cursor = playingNow ? "none" : "auto";
  
    if (gameState === "quit") { hideLobbyInput(); drawQuitScreen(); }
    else if (gameState === "mode25d") { hideLobbyInput(); drawMode25D(); }
    else if (gameState === "main") { hideLobbyInput(); drawMainMenu(); }
    else if (gameState === "menu") { hideLobbyInput(); drawMenu(); }
    else if (gameState === "lobby") drawLobby();
    else if (gameState === "operations") { hideLobbyInput(); drawOperationsMenu(); }
    else if (gameState === "crosshair") { hideLobbyInput(); drawCrosshairScreen(); }
    else if (gameState === "tutorial") { hideLobbyInput(); drawTutorialScreen(); }
    else if (gameState === "original") { hideLobbyInput(); drawOriginalProjectScreen(); }
    else if (gameState === "originalPlaying") { hideLobbyInput(); drawOriginalPlaying(); }
    else drawGame();
  
    requestAnimationFrame(gameLoop);
  }
  
  gameLoop();
</script>
