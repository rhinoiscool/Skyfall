  <script>
// === Skyfall global error handler ===
// If anything in the game throws an uncaught error, the requestAnimationFrame
// loop dies silently and the menu appears frozen. Instead, show a visible red
// banner with the error so the AI iteration loop can fix it instead of guess.
(function installSkyfallErrorBanner() {
  function showError(msg) {
    var bar = document.getElementById("skyfallErrorBar");
    if (!bar) {
      bar = document.createElement("div");
      bar.id = "skyfallErrorBar";
      bar.style.cssText =
        "position:fixed;top:0;left:0;right:0;z-index:99999;" +
        "background:#7a0010;color:#fff;font:bold 13px/1.4 monospace;" +
        "padding:10px 14px;border-bottom:2px solid #ff3344;" +
        "box-shadow:0 2px 8px rgba(0,0,0,.5);white-space:pre-wrap;" +
        "max-height:35vh;overflow:auto;cursor:pointer;";
      bar.title = "Click to dismiss";
      bar.onclick = function(){ bar.remove(); };
      (document.body || document.documentElement).appendChild(bar);
    }
    bar.textContent = "SKYFALL ERROR (click to dismiss): " + msg;
  }
  window.addEventListener("error", function(e) {
    var loc = e.filename ? (" " + e.filename.split("/").pop() + ":" + e.lineno) : "";
    showError((e.message || "Unknown error") + loc);
  });
  window.addEventListener("unhandledrejection", function(e) {
    showError("Promise rejection: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
})();
// === end global error handler ===

function getSafeViewportSize() {
  const vv = window.visualViewport;
  const w = Math.max(320, Math.floor(vv ? vv.width : window.innerWidth));
  const h = Math.max(240, Math.floor(vv ? vv.height : window.innerHeight));
  return { w, h };
}

function resizeCanvas() {
  const oldW = canvas.width || 0;
  const oldH = canvas.height || 0;
  const size = getSafeViewportSize();
  canvas.width = size.w;
  canvas.height = size.h;
  canvas.style.width = size.w + "px";
  canvas.style.height = size.h + "px";

  // Keep the player/buttons in sync when the browser, iframe, or phone orientation changes.
  if (oldW && oldH && player && typeof player.x === "number" && typeof player.y === "number") {
    const sx = size.w / oldW;
    const sy = size.h / oldH;
    player.x = Math.max(0, Math.min(size.w - player.size, player.x * sx));
    player.y = Math.max(0, Math.min(size.h - player.size, player.y * sy));
  }
  mouseX = Math.max(0, Math.min(size.w, mouseX));
  mouseY = Math.max(0, Math.min(size.h, mouseY));
}

window.addEventListener("resize", resizeCanvas, { passive: true });

// Mobile play mode helpers. The goal is: desktop stays unchanged, touch mode gets its own clean layout.
let touchMode = false;
let lastTouchModeTime = 0;
let isTryingFullscreen = false;
let firstPlayHelpUntil = 0;
let trainingRun = false;
let trainingEnemiesStarted = false;
let playerMovedInRun = false;
const SKYFALL_TRAINING_COMPLETE_KEY = "skyfall_v49_5_training_complete";
let skyfallTrainingComplete = localStorage.getItem(SKYFALL_TRAINING_COMPLETE_KEY) === "yes";
let tutorialSeen = localStorage.getItem("skyfall_tutorial_seen_v45") === "yes";

// Show the short in-game CONTROLS hint for the first 5 plays only.
// The CONTROLS menu button still opens the full cheat sheet any time.
const FIRST_PLAY_HELP_COUNT_KEY = "skyfall_controls_hint_play_count_v49_3";
const FIRST_PLAY_HELP_MAX_PLAYS = 5;

function getFirstPlayHelpCount() {
  return Number(localStorage.getItem(FIRST_PLAY_HELP_COUNT_KEY) || "0");
}

function shouldShowFirstPlayHelp() {
  return getFirstPlayHelpCount() < FIRST_PLAY_HELP_MAX_PLAYS;
}

function recordFirstPlayHelpShown() {
  const next = Math.min(FIRST_PLAY_HELP_MAX_PLAYS, getFirstPlayHelpCount() + 1);
  localStorage.setItem(FIRST_PLAY_HELP_COUNT_KEY, String(next));
}

function isTouchMode() {
  return touchMode || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0 && Math.min(canvas.width, canvas.height) < 700);
}

function isMobileScreen() {
  // Stronger check: iPhone/iPad can report a large canvas in some browser states,
  // so do NOT rely only on canvas size. Any touch device gets the mobile HUD.
  return !!(navigator.maxTouchPoints && navigator.maxTouchPoints > 0) || touchMode || window.innerWidth <= 900 || window.innerHeight <= 700;
}

function isLandscapePlay() {
  return canvas.width > canvas.height;
}

function getTouchControls() {
  const small = Math.min(canvas.width, canvas.height);
  const landscape = canvas.width > canvas.height;

  // Smaller, clearer controls for mobile. Keep them low and out of the shooting lane.
  const baseR = landscape
    ? Math.max(32, Math.min(44, small * 0.092))
    : Math.max(38, Math.min(50, small * 0.105));
  const knobR = Math.max(12, baseR * 0.34);
  const pad = Math.max(12, small * 0.026);

  const joy = {
    x: pad + baseR,
    y: canvas.height - pad - baseR,
    r: baseR,
    knobR
  };

  const fireR = landscape
    ? Math.max(30, Math.min(42, small * 0.086))
    : Math.max(36, Math.min(48, small * 0.098));

  const fs = getFullscreenButton();
  const fire = {
    // Leave the far bottom-right corner for the fullscreen button.
    x: canvas.width - pad - fireR - fs.w - 12,
    y: canvas.height - pad - fireR,
    r: fireR
  };

  const dash = {
    x: fire.x - fireR * 1.70,
    y: fire.y + fireR * 0.06,
    r: Math.max(22, fireR * 0.58)
  };

  const weapon = {
    x: fire.x,
    y: fire.y - fireR * 1.78,
    r: Math.max(24, fireR * 0.62)
  };

  return { joy, fire, dash, weapon };
}

function clientToCanvasPoint(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * canvas.width / Math.max(1, rect.width),
    y: (clientY - rect.top) * canvas.height / Math.max(1, rect.height)
  };
}

function pointInCircle(px, py, c) {
  const dx = px - c.x;
  const dy = py - c.y;
  return dx * dx + dy * dy <= c.r * c.r;
}

function requestGameFullscreen() {
  if (isTryingFullscreen) return;
  isTryingFullscreen = true;
  try {
    const el = document.documentElement;
    const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (fn) fn.call(el);
  } catch (err) {}
  nudgeBrowserChromeAway();
  setTimeout(function(){ isTryingFullscreen = false; resizeCanvas(); nudgeBrowserChromeAway(); }, 300);
}

function isFullscreenActive() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
}

function getFullscreenButton() {
  const small = Math.min(canvas.width, canvas.height);
  const size = Math.max(34, Math.min(44, small * 0.07));
  const pad = Math.max(8, small * 0.018);
  return { x: canvas.width - pad - size, y: canvas.height - pad - size, w: size, h: size };
}

function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function drawFullscreenButton() {
  if (!isMobileScreen()) return;
  const b = getFullscreenButton();
  ctx.save();
  ctx.globalAlpha = isFullscreenActive() ? 0.28 : 0.62;
  ctx.fillStyle = "rgba(0,0,0,0.48)";
  ctx.strokeStyle = "rgba(255,255,255,0.72)";
  ctx.lineWidth = 2;
  roundRect(b.x, b.y, b.w, b.h, 9);
  ctx.fill();
  ctx.stroke();
  const m = b.w * 0.25;
  const e = b.w * 0.42;
  ctx.strokeStyle = "#ffffff";
  ctx.beginPath();
  ctx.moveTo(b.x + m, b.y + e); ctx.lineTo(b.x + m, b.y + m); ctx.lineTo(b.x + e, b.y + m);
  ctx.moveTo(b.x + b.w - m, b.y + e); ctx.lineTo(b.x + b.w - m, b.y + m); ctx.lineTo(b.x + b.w - e, b.y + m);
  ctx.moveTo(b.x + m, b.y + b.h - e); ctx.lineTo(b.x + m, b.y + b.h - m); ctx.lineTo(b.x + e, b.y + b.h - m);
  ctx.moveTo(b.x + b.w - m, b.y + b.h - e); ctx.lineTo(b.x + b.w - m, b.y + b.h - m); ctx.lineTo(b.x + b.w - e, b.y + b.h - m);
  ctx.stroke();
  ctx.restore();
}

function handleFullscreenTap(px, py) {
  if (!isMobileScreen()) return false;
  if (pointInRect(px, py, getFullscreenButton())) {
    requestGameFullscreen();
    showSaveMessage(isFullscreenActive() ? "FULLSCREEN ON" : "FULLSCREEN REQUESTED");
    return true;
  }
  return false;
}

function nudgeBrowserChromeAway() {
  try { window.scrollTo(0, 1); } catch (err) {}
}

function aimAtClosestEnemy() {
  const cx = player.x + player.size / 2;
  const cy = player.y + player.size / 2;
  const target = findClosestEnemy(cx, cy);
  if (target) {
    mouseX = target.x + target.size / 2;
    mouseY = target.y + target.size / 2;
    return true;
  }
  mouseX = cx + 120;
  mouseY = cy;
  return false;

function getOperation(id) {
  return OPERATIONS.find(op => op.id === id);
}

function saveOperationProgress() {
  localStorage.setItem("skyfall_operation_progress", String(operationProgress));
}

function enterOperations() {
  hideLobbyInput();
  gameState = "operations";
}

function startOperation(id) {
  const op = getOperation(id);
  if (!op || id > operationProgress) return;

  selectedOperation = op;
  operationMode = true;
  operationStartTime = Date.now();
  operationKills = 0;
  operationCompleteTimer = 0;
  operationMessage = "OPERATION " + op.id + ": " + op.name;
  operationMissionBossSpawned = false;
  operationSucceeded = false;

  resetGame();
  operationMode = true;
  selectedOperation = op;
  operationStartTime = Date.now();
  operationKills = 0;
  kills = 0;

  // Make later operations harder.
  enemyBaseHealth = Math.max(enemyBaseHealth, 1 + Math.floor(op.id / 2));
  bossMaxHealth = 220 + op.id * 55;

  if (op.id >= 3) hasShotgun = true;
  if (op.id >= 5) hasSniper = true;
  if (op.id >= 7) hasRocket = true;
  if (op.id >= 9) hasFlamethrower = true;
}

function completeOperation() {
  if (!selectedOperation || operationCompleteTimer > 0) return;

  const op = selectedOperation;
  operationCompleteTimer = 240;
  operationSucceeded = true;
  operationMessage = "OPERATION COMPLETE: " + op.reward;

  totalCoins += op.coins || 0;
  if (typeof op.apply === "function") op.apply();

  if (operationProgress <= op.id && op.id < OPERATIONS.length) {
    operationProgress = op.id + 1;
    saveOperationProgress();
  }

  saveGame(false);
}

function failOperation() {
  if (!operationMode || !selectedOperation || operationCompleteTimer > 0) return;
  operationSucceeded = false;
  operationMessage = "OPERATION FAILED - NO REWARD";
  operationCompleteTimer = 180;
  player.health = 0;
}

function updateOperationMission() {
  if (!operationMode || !selectedOperation || gameState !== "playing") return;

  const op = selectedOperation;
  const elapsed = Math.floor((Date.now() - operationStartTime) / 1000);

  if (op.type === "survive" && elapsed >= op.target) {
    completeOperation();
  }

  if (op.type === "kills" && operationKills >= op.target) {
    completeOperation();
  }

  if (op.type === "boss" && !operationMissionBossSpawned && elapsed > 4) {
    spawnBoss();
    operationMissionBossSpawned = true;
  }

  if (operationCompleteTimer > 0) {
    operationCompleteTimer--;
    if (operationCompleteTimer === 1) {
      operationMode = false;
      selectedOperation = null;
      gameState = "operations";
    }
  }
}

document.addEventListener("keydown", function(e) {
  keys[e.key.toLowerCase()] = true;

  if (gameState === "mode25d") {
    const k = e.key.toLowerCase();

    if (e.key === "Escape") {
      mode25DActive = false;
      mode25DShopOpen = false;
      gameState = "main";
      return;
    }

    if (k === "r") {
      resetMode25D();
      return;
    }

    if (k === "o") {
      mode25DShopOpen = !mode25DShopOpen;
      return;
    }

    if (k === "1" && mode25DShopOpen) { mode25DBuy("damage"); return; }
    if (k === "2" && mode25DShopOpen) { mode25DBuy("reload"); return; }
    if (k === "3" && mode25DShopOpen) { mode25DBuy("health"); return; }
    if (k === "4" && mode25DShopOpen) { mode25DBuy("heal"); return; }

    if (e.code === "Space") {
      mode25DShoot();
      return;
    }

    // IMPORTANT: do NOT return for WASD / arrow movement keys.
    // The global key system already stores them in keys[], and updateMode25D reads them.
  }

  if (gameState === "lobby") {
    handleLobbyKey(e);
    return;
  }

  if (gameState === "operations") {
    if (e.key === "Escape") gameState = "main";
    return;
  }

  if (gameState === "crosshair") {
    if (e.key === "Escape") gameState = "main";
    return;
  }

  if (gameState === "tutorial") {
    if (e.key === "Escape") gameState = "main";
    return;
  }

  if (e.key.toLowerCase() === "v" && gameState === "playing") {
    saveGame();
  }

  if (e.key === "1") currentWeapon = "regular";
  if (e.key === "2" && hasShotgun) currentWeapon = "shotgun";
  if (e.key === "3" && hasSniper) currentWeapon = "sniper";
  if (e.key === "4" && hasRocket) currentWeapon = "rocket";
  if (e.key === "5" && hasFlamethrower) currentWeapon = "flamethrower";

  if (e.key.toLowerCase() === "p" && gameState === "playing") {
    paused = !paused;
  }


  if (e.code === "Space" && gameState === "playing" && !paused) {
    startDash();
  }
});

function setPointerFromClient(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / Math.max(1, rect.width);
  const scaleY = canvas.height / Math.max(1, rect.height);
  mouseX = (clientX - rect.left) * scaleX;
  mouseY = (clientY - rect.top) * scaleY;
}

canvas.addEventListener("mousemove", function(e) {
  setPointerFromClient(e.clientX, e.clientY);
});

canvas.addEventListener("mousedown", function(e) {
  canvas.focus();
  if (handleFullscreenTap(e.clientX, e.clientY)) return;
  setPointerFromClient(e.clientX, e.clientY);
  if (gameState !== "lobby") hideLobbyInput();
  if (gameState === "mode25d") {
    mode25DShoot();
    return;
  }
  if (gameState === "gameover") {
    handleGameOverClick(e.clientX, e.clientY);
    return;
  }

  if (gameState === "main") {
    checkMainButtons(e.clientX, e.clientY);
  } else if (gameState === "menu") {
    checkMenuButtons(e.clientX, e.clientY);
  } else if (gameState === "operations") {
    checkOperationButtons(e.clientX, e.clientY);
  }

  if (gameState === "lobby") {
    checkLobbyButtons(e.clientX, e.clientY);
  } else if (gameState === "operations") {
    if (e.key === "Escape" || e.key.toLowerCase() === "q") gameState = "main";
    return;
  }

  if (gameState === "crosshair") {
    checkCrosshairButtons(e.clientX, e.clientY);
  } else if (gameState === "tutorial") {
    checkTutorialButtons(e.clientX, e.clientY);
  } else if (gameState === "original") {
    checkOriginalButtons(e.clientX, e.clientY);
  } else if (gameState === "originalPlaying") {
    originalShoot();
  } else if (gameState === "playing") {
    if (checkQuitButton(e.clientX, e.clientY)) return;
    if (!paused) {
      startAudio();
      shoot();
    }
  }
});

let moveTouchId = null;

let moveStartY = 0;

function clearMobileMoveKeys() {
  keys["w"] = false;
  keys["a"] = false;
  keys["s"] = false;
  keys["d"] = false;
}

function updateMobileMoveFromPoint(x, y) {
  const controls = getTouchControls();
  const maxDist = controls.joy.r;
  let dx = x - moveStartX;
  let dy = y - moveStartY;
  const dist = Math.hypot(dx, dy);
  if (dist > maxDist) {
    dx = dx / dist * maxDist;
    dy = dy / dist * maxDist;
  }
  moveCurrentX = moveStartX + dx;
  moveCurrentY = moveStartY + dy;
  clearMobileMoveKeys();
  if (Math.hypot(dx, dy) < 10) return;
  if (gameState === "playing" && !playerMovedInRun) {
    playerMovedInRun = true;
    releaseTrainingEnemiesAfterMove();
  }
  if (dy < -10) keys["w"] = true;
  if (dy > 10) keys["s"] = true;
  if (dx < -10) keys["a"] = true;
  if (dx > 10) keys["d"] = true;
}

function handleTouchMenuAction(touch) {
  setPointerFromClient(touch.clientX, touch.clientY);
  if (gameState === "main") checkMainButtons(mouseX, mouseY);
  else if (gameState === "menu") checkMenuButtons(mouseX, mouseY);
  else if (gameState === "operations") checkOperationButtons(mouseX, mouseY);
  else if (gameState === "lobby") checkLobbyButtons(mouseX, mouseY);
  else if (gameState === "crosshair") checkCrosshairButtons(mouseX, mouseY);
  else if (gameState === "tutorial") checkTutorialButtons(mouseX, mouseY);
  else if (gameState === "original") checkOriginalButtons(mouseX, mouseY);
  else if (gameState === "originalPlaying") originalShoot();
  else if (gameState === "mode25d") mode25DShoot();
  else if (gameState === "gameover") handleGameOverClick(mouseX, mouseY);
}

canvas.addEventListener("touchstart", function(e) {
  e.preventDefault();
  touchMode = true;
  lastTouchModeTime = Date.now();
  canvas.focus();
  resizeCanvas();
  requestGameFullscreen();
  nudgeBrowserChromeAway();

  for (const touch of e.changedTouches) {
    const pt = clientToCanvasPoint(touch.clientX, touch.clientY);
    if (handleFullscreenTap(pt.x, pt.y)) continue;
    if (gameState === "gameover") {
      handleGameOverClick(pt.x, pt.y);
      continue;
    }
    if (gameState === "playing") {
      const controls = getTouchControls();
      if (checkQuitButton(pt.x, pt.y)) return;
      if (pointInCircle(pt.x, pt.y, controls.joy) && moveTouchId === null) {
        moveTouchId = touch.identifier;
        moveStartX = controls.joy.x;
        moveStartY = controls.joy.y;
        moveCurrentX = controls.joy.x;
        moveCurrentY = controls.joy.y;
        updateMobileMoveFromPoint(pt.x, pt.y);
      } else if (pointInCircle(pt.x, pt.y, controls.weapon)) {
        cycleMobileWeapon();
      } else if (pointInCircle(pt.x, pt.y, controls.fire) && fireTouchId === null) {
        fireTouchId = touch.identifier;
        mobileFireHeld = true;
        touchShootAutoAim();
      } else if (pointInCircle(pt.x, pt.y, controls.dash) && dashTouchId === null) {
        dashTouchId = touch.identifier;
        startDash();
      }
    } else {
      handleTouchMenuAction(touch);
    }
  }
}, { passive: false });

canvas.addEventListener("touchmove", function(e) {
  e.preventDefault();
  touchMode = true;
  lastTouchModeTime = Date.now();
  for (const touch of e.changedTouches) {
    const pt = clientToCanvasPoint(touch.clientX, touch.clientY);
    if (touch.identifier === moveTouchId) updateMobileMoveFromPoint(pt.x, pt.y);
  }
}, { passive: false });

canvas.addEventListener("touchend", function(e) {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touch.identifier === moveTouchId) {
      moveTouchId = null;
      clearMobileMoveKeys();
      const controls = getTouchControls();
      moveCurrentX = controls.joy.x;
      moveCurrentY = controls.joy.y;
    }
    if (touch.identifier === fireTouchId) {
      fireTouchId = null;
      mobileFireHeld = false;
    }
    if (touch.identifier === dashTouchId) dashTouchId = null;
  }
}, { passive: false });

canvas.addEventListener("touchcancel", function(e) {
  e.preventDefault();
  moveTouchId = null;
  fireTouchId = null;
  dashTouchId = null;
  mobileFireHeld = false;
  clearMobileMoveKeys();
}, { passive: false });

canvas.addEventListener("wheel", function(e) {
  if (gameState !== "menu") return;
  e.preventDefault();
  shopScroll += e.deltaY;
  clampShopScroll();
}, { passive: false });

function saveGame(showMessage = true) {
  const data = {
    version: 1,
    savedAt: Date.now(),
    gameState: gameState === "playing" ? "playing" : "menu",
    totalCoins, healthLevel, gunLevel, reloadLevel, magnetLevel,
    rocketPowerLevel, rocketReloadLevel,
    flamethrowerLevel,
    hasShotgun, hasSniper, hasRocket, currentWeapon,
    sidekickCount, sidekickLevel, sidekickReloadLevel,
    enemyBaseHealth, enemyHealthTimer, kills, bossActive, bossMaxHealth,
    gameStartTime,
    player: { x: player.x, y: player.y, health: player.health, maxHealth: player.maxHealth },
    enemies: enemies.map(e => ({ ...e })),
    coins: coins.map(c => ({ ...c })),
    healthPacks: healthPacks.map(h => ({ ...h })),
    bullets: bullets.map(packBullet),
    enemyBullets: enemyBullets.map(packBullet),
    sidekickBullets: sidekickBullets.map(packBullet),
    crosshairSkin
  };

  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    if (showMessage) showSaveMessage("GAME SAVED");
    return true;
  } catch (err) {
    if (showMessage) showSaveMessage("SAVE FAILED");
    return false;
  }
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) {
    showSaveMessage("NO SAVE FOUND");
    return;
  }

  let data;
  try {
    data = JSON.parse(raw);
  } catch (err) {
    showSaveMessage("SAVE BROKEN");
    return;
  }

  totalCoins = data.totalCoins || 0;
  healthLevel = data.healthLevel || 1;
  gunLevel = data.gunLevel || 1;
  reloadLevel = data.reloadLevel || 1;
  magnetLevel = data.magnetLevel || 0;
  rocketPowerLevel = data.rocketPowerLevel || 1;
  rocketReloadLevel = data.rocketReloadLevel || 1;
  flamethrowerLevel = data.flamethrowerLevel || 1;
  hasShotgun = !!data.hasShotgun;
  hasSniper = !!data.hasSniper;
  hasRocket = !!data.hasRocket;
  hasFlamethrower = !!data.hasFlamethrower;
  currentWeapon = data.currentWeapon || "regular";
  sidekickCount = data.sidekickCount || 0;
  sidekickLevel = data.sidekickLevel || 1;
  sidekickReloadLevel = data.sidekickReloadLevel || 1;
  enemyBaseHealth = data.enemyBaseHealth || 2;
  enemyHealthTimer = data.enemyHealthTimer || 0;
  kills = data.kills || 0;
  bossActive = !!data.bossActive;
  bossMaxHealth = data.bossMaxHealth || 250;
  crosshairSkin = data.crosshairSkin || "red";

  bullets.length = 0;
  enemyBullets.length = 0;
  enemies.length = 0;
  coins.length = 0;
  healthPacks.length = 0;
  sidekickBullets.length = 0;
  explosions.length = 0;
  smokeParticles.length = 0;
  deathParticles.length = 0;
  floatingTexts.length = 0;
  fireSpots.length = 0;
  laserWarnings.length = 0;

  Object.assign(player, data.player || {});
  if (!player.maxHealth) player.maxHealth = 100 + (healthLevel - 1) * 25;
  if (!player.health) player.health = player.maxHealth;

  (data.enemies || []).forEach(e => enemies.push({ ...e }));
  (data.coins || []).forEach(c => coins.push({ ...c }));
  (data.healthPacks || []).forEach(h => healthPacks.push({ ...h }));
  (data.bullets || []).forEach(b => bullets.push({ ...b }));
  (data.enemyBullets || []).forEach(b => enemyBullets.push({ ...b }));
  (data.sidekickBullets || []).forEach(b => sidekickBullets.push({ ...b }));

  paused = false;
  dashCooldown = 0;
  dashTimer = 0;
  playerFlashTimer = 0;
  lowHealthFlashTimer = 0;
  playerBurnTimer = 0;
  playerBurnTick = 0;
  playerBurnDamage = 0;
  screenShakeTimer = 0;
  screenShakePower = 0;
  bossWarningTimer = 0;
  gameStartTime = data.gameStartTime || Date.now();
  lastAutoSaveTime = Date.now();

  gameState = data.gameState === "playing" ? "playing" : "main";
  showSaveMessage("GAME LOADED");
}

function generateRoomCode() {
  return String(Math.floor(100000 + Math.random() * 900000));
}

function enterLobby() {
  gameState = "lobby";
  roomCode = roomCode || generateRoomCode();
  joinCode = "";
  lobbyMessage = "Click the JOIN CODE box, type 6 numbers, then press Enter or JOIN CODE.";
  ensureLobbyInput();
  setTimeout(function() { canvas.focus(); }, 0);
}

function handleLobbyKey(e) {
  if (document.activeElement === lobbyInput) return;
  if (e.key === "Escape") {
    gameState = "main";
    return;
  }
  if (e.key === "Backspace") {
    joinCode = joinCode.slice(0, -1);
    e.preventDefault();
    return;
  }
  if (e.key === "Enter") {
    tryJoinRoom();
    return;
  }
  if (/^[0-9]$/.test(e.key) && joinCode.length < 6) {
    joinCode += e.key;
  }
}

  } catch (err) {
    audioCtx = null;
  }
}

function playTone(freq, duration, volume = 0.05, type = "square") {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}

function playSound(name) {
  if (name === "shoot") playTone(520, 0.05, 0.03);
  if (name === "rocket") playTone(120, 0.12, 0.06, "sawtooth");
  if (name === "flame") playTone(95, 0.06, 0.035, "sawtooth");
  if (name === "hit") playTone(180, 0.04, 0.025);
  if (name === "pickup") { playTone(760, 0.07, 0.035, "triangle"); setTimeout(function(){ playTone(980, 0.06, 0.025, "triangle"); }, 45); }
  if (name === "explode") { playTone(70, 0.22, 0.09, "sawtooth"); setTimeout(function(){ playTone(45, 0.24, 0.055, "sine"); }, 35); }
  if (name === "lowhp") playTone(220, 0.12, 0.035, "sine");
  if (name === "laser") playTone(360, 0.16, 0.035, "sawtooth");
}

function getMaxShopScroll() {
  const contentHeight = SHOP_ITEM_COUNT * SHOP_ITEM_GAP + SHOP_BUTTON_H;
  const visibleHeight = getShopBottom() - SHOP_TOP;
  return Math.max(0, contentHeight - visibleHeight);
}

function clampShopScroll() {
  shopScroll = Math.max(0, Math.min(getMaxShopScroll(), shopScroll));

function getShopY(index) {

function drawHomeInfoPanel(x, y, w, h, title, lines) {
  ctx.fillStyle = "rgba(3, 14, 24, 0.78)";
  roundRect(x, y, w, h, 14);
  ctx.fill();
  ctx.strokeStyle = "rgba(0, 229, 255, 0.55)";
  ctx.lineWidth = 2;
  roundRect(x, y, w, h, 14);
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  roundRect(x + 3, y + 3, w - 6, h - 6, 12);
  ctx.clip();

  ctx.textAlign = "center";
  ctx.fillStyle = "#00e5ff";
  ctx.font = "bold 22px Arial";
  ctx.fillText(title, x + w / 2, y + 34);

  ctx.textAlign = "left";
  ctx.fillStyle = "#e8fbff";
  ctx.font = title === "TIPS" ? "15px Arial" : "16px Arial";

  const leftPad = 24;
  const maxTextW = w - leftPad - 18;
  let yy = y + 70;
  const lineGap = title === "TIPS" ? 24 : 34;

  for (const line of lines) {
    const words = String(line).split(" ");
    let current = "";
    for (const word of words) {
      const test = current ? current + " " + word : word;
      if (ctx.measureText(test).width > maxTextW && current) {
        if (yy < y + h - 18) ctx.fillText(current, x + leftPad, yy);
        yy += lineGap;
        current = word;
      } else {
        current = test;
      }
    }
    if (current && yy < y + h - 18) ctx.fillText(current, x + leftPad, yy);
    yy += lineGap + (title === "TIPS" ? 5 : 0);
  }

  ctx.restore();
}

  menuButtons.push({ text, x, y, w, h, action, fixed, category });
}

function checkMenuButtons(x, y) {
  for (let button of menuButtons) {
    if (!isButtonInShopView(button)) continue;
    if (!button.fixed && (y < SHOP_TOP || y > getShopBottom())) continue;

    if (x >= button.x && x <= button.x + button.w && y >= button.y && y <= button.y + button.h) {
      button.action();
      return;
    }
  }
}

function resetGame(forceTraining = false) {
  // CrazyGames fix: first launch goes straight into playable training.
  // Training is real gameplay, not a separate menu/video. It ends only after the first death.
  if (forceTraining || !skyfallTrainingComplete) {
    trainingRun = true;
  } else {
    trainingRun = false;
  }
  trainingEnemiesStarted = false;
  playerMovedInRun = false;
  bullets.length = 0;
  enemyBullets.length = 0;
  enemies.length = 0;
  coins.length = 0;
  healthPacks.length = 0;
  sidekickBullets.length = 0;
  explosions.length = 0;
  smokeParticles.length = 0;
  deathParticles.length = 0;
  floatingTexts.length = 0;

  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.maxHealth = 100 + (healthLevel - 1) * 25;
  player.health = player.maxHealth;

  enemyBaseHealth = 2;
  enemyHealthTimer = 0;
  kills = 0;
  bossActive = false;
  bossMaxHealth = 250;
  bossWarningTimer = 0;
  screenShakeTimer = 0;
  screenShakePower = 0;
  dashCooldown = 0;
  dashTimer = 0;
  gameStartTime = Date.now();
  if (shouldShowFirstPlayHelp()) {
    // Training hint stays longer but still disappears immediately when the player moves.
    firstPlayHelpUntil = Date.now() + (trainingRun ? 22000 : 6500);
    recordFirstPlayHelpShown();
  } else {
    firstPlayHelpUntil = 0;
  }
  paused = false;
  playerFlashTimer = 0;
  lowHealthFlashTimer = 0;
  comboCount = 0;
  comboTimer = 0;

  if (!trainingRun) {
    const startingEnemies = mainEnemyDifficulty === "easy" ? 3 : mainEnemyDifficulty === "medium" ? 4 : 5;
    for (let i = 0; i < startingEnemies; i++) spawnEnemy();
  }

  gameState = "playing";
}

function getReloadBonus() {
  return (reloadLevel - 1) * 80;
}

function getWeaponStats() {
  if (currentWeapon === "shotgun") {
    return { cooldown: Math.max(300, 750 - getReloadBonus()), speed: 10, damage: 1 + Math.floor(gunLevel / 2), bossDamage: 2 + gunLevel, radius: 4, pellets: 5, spread: 0.45, color: "orange" };
  }
  if (currentWeapon === "sniper") {
    return { cooldown: Math.max(700, 1600 - getReloadBonus()), speed: 20, damage: 999, bossDamage: 15 + gunLevel * 4, radius: 5, pellets: 1, spread: 0, color: "cyan" };
  }
  if (currentWeapon === "rocket") {
    return { cooldown: Math.max(850, 2100 - getReloadBonus() - rocketReloadLevel * 60), speed: 8, damage: 2 + Math.floor(gunLevel / 2), bossDamage: 5 + gunLevel, splashDamage: 2 + Math.floor(gunLevel / 2) + rocketPowerLevel, bossSplashDamage: 4 + gunLevel + rocketPowerLevel * 2, explosionRadius: 65 + rocketPowerLevel * 4, radius: 7, pellets: 1, spread: 0, color: "#ff9933", explosive: true };
  }
  if (currentWeapon === "flamethrower") {
    return { cooldown: Math.max(80, 170 - getReloadBonus() / 6), speed: 7.5, damage: 1 + Math.floor(flamethrowerLevel / 2), bossDamage: 1 + flamethrowerLevel, radius: 6, pellets: 3, spread: 0.35, color: "#ff5a00", flame: true, range: 35 };
  }
  return { cooldown: Math.max(120, 500 - gunLevel * 55 - getReloadBonus()), speed: 13, damage: gunLevel, bossDamage: gunLevel, radius: 4, pellets: 1, spread: 0, color: "yellow" };
}

function getAvailableWeapons() {
  const list = ["regular"];
  if (hasShotgun) list.push("shotgun");
  if (hasSniper) list.push("sniper");
  if (hasRocket) list.push("rocket");
  if (hasFlamethrower) list.push("flamethrower");
  return list;
}

function getWeaponShortName(name = currentWeapon) {
  if (name === "regular") return "REG";
  if (name === "shotgun") return "SHOT";
  if (name === "sniper") return "SNIPE";
  if (name === "rocket") return "ROCKET";
  if (name === "flamethrower") return "FLAME";
  return name.toUpperCase();
}

function cycleMobileWeapon() {
  const list = getAvailableWeapons();
  if (!list.length) return;
  let idx = list.indexOf(currentWeapon);
  if (idx < 0) idx = 0;
  currentWeapon = list[(idx + 1) % list.length];
  showSaveMessage("WEAPON: " + getWeaponShortName(currentWeapon));
  saveGame();
}

function shoot() {
  const now = Date.now();
  const weapon = getWeaponStats();
  if (now - lastShotTime < weapon.cooldown) return;
  lastShotTime = now;
  playSound(currentWeapon === "rocket" ? "rocket" : currentWeapon === "flamethrower" ? "flame" : "shoot");
  const centerX = player.x + player.size / 2;
  const centerY = player.y + player.size / 2;
  const baseAngle = Math.atan2(mouseY - centerY, mouseX - centerX);
  for (let i = 0; i < weapon.pellets; i++) {
    const offset = weapon.pellets === 1 ? 0 : (i - (weapon.pellets - 1) / 2) * (weapon.spread / (weapon.pellets - 1));
    const angle = baseAngle + offset + (weapon.flame ? (Math.random() - 0.5) * 0.18 : 0);
    bullets.push({
      x: centerX,
      y: centerY,
      lastX: centerX,
      lastY: centerY,
      radius: weapon.radius,
      speed: weapon.speed,
      damage: weapon.damage,
      bossDamage: weapon.bossDamage,
      color: weapon.color,
      dx: Math.cos(angle),
      dy: Math.sin(angle),
      explosive: weapon.explosive || false,
      flame: weapon.flame || false,
      life: weapon.flame ? 28 + flamethrowerLevel * 3 : 999,
      explosionRadius: weapon.explosionRadius || 0,
      splashDamage: weapon.splashDamage || 0,
      bossSplashDamage: weapon.bossSplashDamage || 0
    });
  }
}


function getMainDifficulty() {
  return MAIN_ENEMY_DIFFICULTY_SETTINGS[mainEnemyDifficulty] || MAIN_ENEMY_DIFFICULTY_SETTINGS.normal;
}

function cycleMainEnemyDifficulty() {
  // Correct order: EASY -> MEDIUM -> HARD -> EASY
  if (mainEnemyDifficulty === "easy") mainEnemyDifficulty = "medium";
  else if (mainEnemyDifficulty === "medium" || mainEnemyDifficulty === "normal") mainEnemyDifficulty = "hard";
  else mainEnemyDifficulty = "easy";

  localStorage.setItem("skyfall_main_enemy_difficulty", mainEnemyDifficulty);
}

function applyMainEnemyDifficulty(enemy) {
  const d = getMainDifficulty();

  if (typeof enemy.health === "number") {
    enemy.health = Math.max(1, Math.ceil(enemy.health * d.health));
  }

  if (typeof enemy.speed === "number") {
    enemy.speed = enemy.speed * d.speed;
  }

  if (typeof enemy.reload === "number") {
    enemy.reload = Math.max(350, Math.round(enemy.reload * d.reload));
  }

  if (enemy.type === "boss" && typeof enemy.health === "number") {
    enemy.health = Math.max(1, Math.ceil(enemy.health * d.boss));
  }

  enemy.difficulty = mainEnemyDifficulty;
  enemy.damageScale = d.playerDamage || 1;
  enemy.bulletSpeedScale = d.bulletSpeed || 1;
  return enemy;
}

function pushMainEnemy(enemy) {
  enemies.push(applyMainEnemyDifficulty(enemy));
}

function getSpawnPoint(extraDistance = 40) {
  const side = Math.floor(Math.random() * 4);
  let x, y;

  if (side === 0) {
    x = Math.random() * canvas.width;
    y = -40;
  } else if (side === 1) {
    x = canvas.width + 40;
    y = Math.random() * canvas.height;
  } else if (side === 2) {
    x = Math.random() * canvas.width;
    y = canvas.height + 40;
  } else {
    x = -40;
    y = Math.random() * canvas.height;
  }

  return { x, y };
}

function spawnEnemy() {
  const spawn = getSpawnPoint();
  const d = getMainDifficulty();
  const specialScale = d.specials || 1;
  const roll = Math.random();

  // On Easy/Medium, special enemies appear less often. Soldiers/rushers carry the early game.
  if (roll < 0.08 * specialScale) {
    spawnBurner(spawn.x, spawn.y);
  } else if (roll < 0.14 * specialScale) {
    spawnLaserEnemy(spawn.x, spawn.y);
  } else if (roll < 0.20 * specialScale) {
    spawnSplitter(spawn.x, spawn.y);
  } else if (roll < 0.25 * specialScale) {
    spawnElite(spawn.x, spawn.y);
  } else if (roll < 0.28 * specialScale) {
    spawnMiniBoss(spawn.x, spawn.y);
  } else if (roll < 0.43 * specialScale) {
    spawnSniper();
  } else if (roll < 0.64) {
    spawnRusher(spawn.x, spawn.y);
  } else {
    spawnSoldier(spawn.x, spawn.y);
  }
}

function enemyShoot(enemy) {
  const centerX = enemy.x + enemy.size / 2;
  const centerY = enemy.y + enemy.size / 2;
  const playerX = player.x + player.size / 2;
  const playerY = player.y + player.size / 2;
  const angle = Math.atan2(playerY - centerY, playerX - centerX);

  if (enemy.type === "burn") {
    for (let i = 0; i < 4; i++) {
      const a = angle + (i - 1.5) * 0.18 + (Math.random() - 0.5) * 0.12;
      enemyBullets.push({ x: centerX, y: centerY, lastX: centerX, lastY: centerY, radius: 7, speed: 4.3 * (enemy.bulletSpeedScale || 1), damage: 6 * (enemy.damageScale || 1), dx: Math.cos(a), dy: Math.sin(a), color: "#ff6a00", flame: true, life: 45 });
    }
    return;
  }

  if (enemy.type === "laser") {
    laserWarnings.push({ x: centerX, y: centerY, dx: Math.cos(angle), dy: Math.sin(angle), life: 32 });
    setTimeout(function() {
      enemyBullets.push({ x: centerX, y: centerY, lastX: centerX, lastY: centerY, radius: 7, speed: 9 * (enemy.bulletSpeedScale || 1), damage: 20 * (enemy.damageScale || 1), dx: Math.cos(angle), dy: Math.sin(angle), color: "#ff1744", laser: true });
      playSound("laser");
    }, 280);
    return;
  }

  const shots = enemy.type === "miniboss" ? 3 : enemy.type === "elite" ? 2 : 1;
  for (let i = 0; i < shots; i++) {
    const spread = shots === 1 ? 0 : (i - (shots - 1) / 2) * 0.22;
    const a = angle + spread;
    enemyBullets.push({
      x: centerX,
      y: centerY,
      lastX: centerX,
      lastY: centerY,
      radius: enemy.type === "boss" ? 8 : enemy.type === "sniper" ? 6 : enemy.type === "miniboss" ? 7 : 5,
      speed: (enemy.type === "boss" ? 5 : enemy.type === "sniper" ? 3.2 : enemy.type === "elite" ? 5.5 : 4) * (enemy.bulletSpeedScale || 1),
      damage: (enemy.type === "boss" ? 15 : enemy.type === "sniper" ? 22 : enemy.type === "miniboss" ? 14 : enemy.type === "elite" ? 10 : 7) * (enemy.damageScale || 1),
      color: enemy.type === "elite" ? "#cc66ff" : enemy.type === "miniboss" ? "#ff3355" : "orange",
      dx: Math.cos(a),
      dy: Math.sin(a)
    });
  }
}

function findClosestEnemy(x, y, ignoredTargets = new Set()) {
  let closest = null;
  let closestDistance = Infinity;

  for (let enemy of enemies) {
    if (ignoredTargets.has(enemy)) continue;

    const dx = enemy.x + enemy.size / 2 - x;
    const dy = enemy.y + enemy.size / 2 - y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < closestDistance) {
      closestDistance = distance;
      closest = enemy;
    }
  }

  return closest;
}

function getSidekickPosition(index) {
  const spots = [
    { x: player.x - 28, y: player.y + 5 },
    { x: player.x + player.size + 10, y: player.y + 5 },
    { x: player.x + 6, y: player.y + player.size + 12 }
  ];

  return spots[index];
}

function updateSidekicks() {
  if (sidekickCount <= 0) return;

  const now = Date.now();
  const cooldown = Math.max(250, 1200 - sidekickReloadLevel * 130);

  if (now - lastSidekickShot < cooldown) return;

  lastSidekickShot = now;

  const alreadyTargeted = new Set();

  for (let i = 0; i < sidekickCount; i++) {
    const pos = getSidekickPosition(i);
    let target = findClosestEnemy(pos.x, pos.y, alreadyTargeted);

    // If there are fewer enemies than sidekicks, let extras help finish the closest enemy.
    if (!target) target = findClosestEnemy(pos.x, pos.y);
    if (!target) continue;

    alreadyTargeted.add(target);

    const angle = Math.atan2(
      target.y + target.size / 2 - pos.y,
      target.x + target.size / 2 - pos.x
    );

    sidekickBullets.push({
      x: pos.x + 9,
      y: pos.y + 9,
      radius: 4,
      speed: 11,
      damage: sidekickLevel,
      bossDamage: Math.max(1, Math.floor(sidekickLevel / 2)),
      color: "lime",
      dx: Math.cos(angle),
      dy: Math.sin(angle)
    });
  }
}


function startDash() {
  if (dashCooldown > 0 || dashTimer > 0) return;
  let x = 0;
  let y = 0;
  if (keys["w"]) y -= 1;
  if (keys["s"]) y += 1;
  if (keys["a"]) x -= 1;
  if (keys["d"]) x += 1;
  if (x === 0 && y === 0) {
    const centerX = player.x + player.size / 2;
    const centerY = player.y + player.size / 2;
    const angle = Math.atan2(mouseY - centerY, mouseX - centerX);
    x = Math.cos(angle);
    y = Math.sin(angle);
  }
  const len = Math.sqrt(x * x + y * y) || 1;
  dashDx = x / len;
  dashDy = y / len;
  dashTimer = 9;
  dashCooldown = 70;
  addFloatingText("DASH", player.x, player.y - 8, "cyan");
}

function releaseTrainingEnemiesAfterMove() {
  if (!trainingRun || trainingEnemiesStarted) return;
  // As soon as the player actually moves, remove the semi-transparent cheat sheet.
  // This keeps the first-launch onboarding playable instead of feeling like a menu/tutorial screen.
  firstPlayHelpUntil = 0;
  trainingEnemiesStarted = true;
  const startingEnemies = mainEnemyDifficulty === "easy" ? 2 : mainEnemyDifficulty === "medium" ? 3 : 4;
  for (let i = 0; i < startingEnemies; i++) spawnEnemy();
  addFloatingText("ENEMIES INCOMING", player.x, player.y - 24, "yellow");
}

function updatePlayer() {
  if (dashCooldown > 0) dashCooldown--;

  if (dashTimer > 0) {
    player.x += dashDx * 16;
    player.y += dashDy * 16;
    dashTimer--;
  } else {
    const movedNow = keys["w"] || keys["arrowup"] || keys["s"] || keys["arrowdown"] || keys["a"] || keys["arrowleft"] || keys["d"] || keys["arrowright"];
    if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
    if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
    if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
    if (keys["d"] || keys["arrowright"]) player.x += player.speed;
    if (movedNow && !playerMovedInRun) {
      playerMovedInRun = true;
      releaseTrainingEnemiesAfterMove();
    }
  }

  player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

  if (playerFlashTimer > 0) playerFlashTimer--;
  if (lowHealthFlashTimer > 0) lowHealthFlashTimer--;
}

function updateBullets() {
  for (let bullet of bullets) {
    bullet.lastX = bullet.x;
    bullet.lastY = bullet.y;
    bullet.x += bullet.dx * bullet.speed;
    bullet.y += bullet.dy * bullet.speed;
    if (bullet.flame) {
      bullet.life--;
      fireSpots.push({ x: bullet.x, y: bullet.y, radius: 5 + Math.random() * 4, life: 16, damage: 0 });
    }
    if (bullet.explosive && Math.random() < 0.7) {
      smokeParticles.push({ x: bullet.x - bullet.dx * 6, y: bullet.y - bullet.dy * 6, radius: 5, life: 28 });
    }
  }
  for (let bullet of sidekickBullets) {
    bullet.lastX = bullet.x;
    bullet.lastY = bullet.y;
    bullet.x += bullet.dx * bullet.speed;
    bullet.y += bullet.dy * bullet.speed;
  }
  for (let bullet of enemyBullets) {
    bullet.lastX = bullet.x;
    bullet.lastY = bullet.y;
    bullet.x += bullet.dx * bullet.speed;
    bullet.y += bullet.dy * bullet.speed;
    if (bullet.flame) {
      bullet.life--;
      fireSpots.push({ x: bullet.x, y: bullet.y, radius: 7 + Math.random() * 5, life: 28, damage: 5 });
    }
  }
  removeExpiredBullets(bullets);
  removeExpiredBullets(enemyBullets);
  removeOffscreen(bullets);
  removeOffscreen(sidekickBullets);
  removeOffscreen(enemyBullets);
}

function removeExpiredBullets(list) {
  for (let i = list.length - 1; i >= 0; i--) {
    if (list[i].life !== undefined && list[i].life <= 0) list.splice(i, 1);
  }
}

function applyBurnToEnemy(enemy, durationFrames, damagePerTick) {
  if (!enemy) return;
  enemy.burnTimer = Math.max(enemy.burnTimer || 0, durationFrames);
  enemy.burnTick = enemy.burnTick || 0;
  enemy.burnDamage = Math.max(enemy.burnDamage || 0, damagePerTick);
  enemy.isBurning = true;
  addFloatingText("BURN", enemy.x + enemy.size / 2, enemy.y - 14, "#ff7a00");
}

function applyBurnToPlayer(durationFrames, damagePerTick) {
  playerBurnTimer = Math.max(playerBurnTimer, durationFrames);
  playerBurnDamage = Math.max(playerBurnDamage, damagePerTick);
  addFloatingText("BURN", player.x + player.size / 2, player.y - 18, "#ff7a00");
}

function updateEffects() {
  if (screenShakeTimer > 0) screenShakeTimer--;
  if (bossWarningTimer > 0) bossWarningTimer--;
  if (comboTimer > 0) comboTimer--; else comboCount = 0;
  if (player.health <= player.maxHealth * 0.2 && gameState === "playing") {
    lowHpSoundTimer--;
    if (lowHpSoundTimer <= 0) { playSound("lowhp"); lowHpSoundTimer = 55; }
  } else {
    lowHpSoundTimer = 0;
  }

  if (playerBurnTimer > 0) {
    playerBurnTimer--;
    playerBurnTick--;
    if (Math.random() < 0.45) {
      fireSpots.push({ x: player.x + Math.random() * player.size, y: player.y + Math.random() * player.size, radius: 4 + Math.random() * 5, life: 18, damage: 0 });
    }
    if (playerBurnTick <= 0) {
      damagePlayer(playerBurnDamage || 1);
      playerBurnTick = 30;
    }
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const enemy = enemies[i];
    if (!enemy || !enemy.burnTimer) continue;
    enemy.burnTimer--;
    enemy.burnTick = (enemy.burnTick || 0) - 1;
    if (Math.random() < 0.55) {
      fireSpots.push({ x: enemy.x + Math.random() * enemy.size, y: enemy.y + Math.random() * enemy.size, radius: 4 + Math.random() * 6, life: 20, damage: 0 });
    }
    if (enemy.burnTick <= 0) {
      const burnDamage = enemy.type === "boss" ? Math.max(1, Math.floor((enemy.burnDamage || 1) / 2)) : (enemy.burnDamage || 1);
      enemy.health -= burnDamage;
      enemy.hitFlash = 8;
      addFloatingText("-" + burnDamage, enemy.x + enemy.size / 2, enemy.y - 10, "#ff7a00");
      enemy.burnTick = 26;
      if (enemy.health <= 0) {
        killEnemy(i);
        continue;
      }
    }
    if (enemy.burnTimer <= 0) {
      enemy.isBurning = false;
      enemy.burnDamage = 0;
    }
  }

  for (let i = laserWarnings.length - 1; i >= 0; i--) {
    laserWarnings[i].life--;
    if (laserWarnings[i].life <= 0) laserWarnings.splice(i, 1);
  }
  for (let i = fireSpots.length - 1; i >= 0; i--) {
    const f = fireSpots[i];
    f.radius += 0.08;
    f.life--;
    if (f.damage && f.life % 10 === 0 && player.x < f.x + f.radius && player.x + player.size > f.x - f.radius && player.y < f.y + f.radius && player.y + player.size > f.y - f.radius) {
      damagePlayer(f.damage);
    }
    if (f.life <= 0) fireSpots.splice(i, 1);
  }
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].radius += explosions[i].grow;
    explosions[i].life--;
    if (explosions[i].life <= 0) explosions.splice(i, 1);
  }
  for (let i = smokeParticles.length - 1; i >= 0; i--) {
    smokeParticles[i].radius += 0.25;
    smokeParticles[i].life--;
    if (smokeParticles[i].life <= 0) smokeParticles.splice(i, 1);
  }
  for (let i = deathParticles.length - 1; i >= 0; i--) {
    const p = deathParticles[i];
    p.x += p.dx;
    p.y += p.dy;
    p.life--;
    if (p.life <= 0) deathParticles.splice(i, 1);
  }
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y -= 0.7;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}

function removeOffscreen(list) {
  for (let i = list.length - 1; i >= 0; i--) {
    const b = list[i];
    if (b.x < -80 || b.x > canvas.width + 80 || b.y < -80 || b.y > canvas.height + 80) {
      list.splice(i, 1);
    }
  }
}

function getSidekickDifficultyBonus() {
  return sidekickCount * 0.18;
}

function getMaxNormalEnemies() {
  const d = getMainDifficulty();
  const base = 9 + sidekickCount * 3;
  return Math.max(4, Math.round(base * (d.maxEnemies || d.spawn || 1)));
}

function updateEnemies() {
  enemyHealthTimer++;
  const healthRamp = mainEnemyDifficulty === "easy" ? 1400 : mainEnemyDifficulty === "medium" ? 950 : 700;
  if (enemyHealthTimer > healthRamp) { enemyBaseHealth++; enemyHealthTimer = 0; }
  const normalEnemyCount = enemies.filter(e => e.type !== "boss").length;
  if (!trainingRun || trainingEnemiesStarted) {
    if (normalEnemyCount < getMaxNormalEnemies()) spawnEnemy();
    if (!bossActive && kills >= killsNeededForBoss) spawnBoss();
  }
  const now = Date.now();
  for (let enemy of enemies) {
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const distance = Math.sqrt(dx * dx + dy * dy);
    if (enemy.type === "rusher" && distance > 0) {
      enemy.x += (dx / distance) * enemy.speed;
      enemy.y += (dy / distance) * enemy.speed;
    } else if (["soldier", "boss", "elite", "splitter", "miniboss", "burn", "laser"].includes(enemy.type)) {
      const stopDist = enemy.type === "burn" ? 190 : enemy.type === "laser" ? 260 : 150;
      if (distance > stopDist && distance > 0) {
        enemy.x += (dx / distance) * enemy.speed;
        enemy.y += (dy / distance) * enemy.speed;
      }
    }
    if (enemy.type !== "rusher" && now - enemy.lastShot > enemy.reload) {
      enemyShoot(enemy);
      enemy.lastShot = now;
    }
  }
}

function updateCoins() {
  for (let i = coins.length - 1; i >= 0; i--) {
    const coin = coins[i];
    if (magnetLevel > 0) {
      const px = player.x + player.size / 2;
      const py = player.y + player.size / 2;
      const dx = px - coin.x;
      const dy = py - coin.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const range = 120 + magnetLevel * 70;
      if (dist < range && dist > 1) {
        coin.x += (dx / dist) * (2.2 + magnetLevel * 0.85);
        coin.y += (dy / dist) * (2.2 + magnetLevel * 0.85);
      }
    }

    if (
      player.x < coin.x + coin.size &&
      player.x + player.size > coin.x &&
      player.y < coin.y + coin.size &&
      player.y + player.size > coin.y
    ) {
      totalCoins += coin.value;
      playSound("pickup");
      coins.splice(i, 1);
    }
  }
}

function dropCoin(x, y, value) {
  coins.push({ x, y, size: 16, value });
}
function updateHealthPacks() {
  for (let i = healthPacks.length - 1; i >= 0; i--) {
    const pack = healthPacks[i];

    if (
      player.x < pack.x + pack.size &&
      player.x + player.size > pack.x &&
      player.y < pack.y + pack.size &&
      player.y + player.size > pack.y
    ) {
      const healAmount = player.maxHealth * 0.2;
      player.health = Math.min(player.maxHealth, player.health + healAmount);
      healthPacks.splice(i, 1);
    }
  }
}

function dropHealthPack(x, y) {
  healthPacks.push({ x, y, size: 24 });
}


function bulletHitsEnemy(bullet, enemy) {
  return (
    bullet.x > enemy.x &&
    bullet.x < enemy.x + enemy.size &&
    bullet.y > enemy.y &&
    bullet.y < enemy.y + enemy.size
  );
}

function damageEnemy(enemy, bullet) {
  let damage = enemy.type === "boss" ? (bullet.bossDamage || 10) : (bullet.damage || 1);
  if (bullet.flame) damage += Math.floor(flamethrowerLevel / 2);
  if (!bullet.explosive && Math.random() < 0.08) {
    damage *= 2;
    addFloatingText("CRITICAL!", enemy.x, enemy.y - 5, "yellow");
  }
  enemy.health -= damage;
  if (bullet.flame) {
    applyBurnToEnemy(enemy, 150 + flamethrowerLevel * 25, 1 + Math.floor(flamethrowerLevel / 2));
  }
  enemy.hitFlash = 8;
  addFloatingText(Math.floor(damage), enemy.x + enemy.size / 2, enemy.y, bullet.flame ? "#ff9933" : "#ffffff");
  playSound("hit");
}

function killEnemy(index) {
  const enemy = enemies[index];
  if (!enemy) return;
  if (enemy.type === "boss") {
    dropHealthPack(enemy.x + enemy.size / 2, enemy.y + enemy.size / 2);
    bossMaxHealth += 50;
    bossActive = false;
    if (operationMode && selectedOperation && selectedOperation.type === "boss") completeOperation();
    kills = 0;
  } else {
    const coinValue = enemy.type === "sniper" ? 50 : enemy.type === "rusher" ? 25 : enemy.type === "burn" ? 55 : enemy.type === "elite" ? 85 : enemy.type === "splitter" ? 65 : enemy.type === "laser" ? 70 : enemy.type === "miniboss" ? 150 : 35;
    dropCoin(enemy.x + enemy.size / 2, enemy.y + enemy.size / 2, coinValue);
    kills++;
    if (operationMode && selectedOperation && selectedOperation.type === "kills") operationKills++;
    comboCount++;
    comboTimer = 160;
    if (comboCount >= 3) addFloatingText("COMBO x" + comboCount, enemy.x, enemy.y - 18, "#00e5ff");
    const d = getMainDifficulty();
    if (Math.random() < (d.healthDrop || 0.05)) dropHealthPack(enemy.x + enemy.size / 2, enemy.y + enemy.size / 2);
    if (enemy.type === "splitter") {
      // Easy mode should not punish the player with two surprise rushers every time.
      const splitterChildren = mainEnemyDifficulty === "easy" ? 1 : 2;
      for (let s = 0; s < splitterChildren; s++) spawnRusher(enemy.x + (s === 0 ? -18 : 18), enemy.y + 8);
    }
  }
  createDeathParticles(enemy);
  enemies.splice(index, 1);
}

function createDeathParticles(enemy) {
  const color = enemy.type === "boss" ? "purple" : enemy.type === "sniper" ? "white" : enemy.type === "rusher" ? "#ff3333" : enemy.type === "burn" ? "#ff7a00" : enemy.type === "elite" ? "#cc66ff" : enemy.type === "laser" ? "#ff1744" : enemy.type === "miniboss" ? "#ff0055" : "red";
  for (let i = 0; i < (enemy.type === "miniboss" ? 28 : 14); i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    deathParticles.push({ x: enemy.x + enemy.size / 2, y: enemy.y + enemy.size / 2, dx: Math.cos(angle) * speed, dy: Math.sin(angle) * speed, size: 3 + Math.random() * 4, color, life: 25 + Math.random() * 25 });
  }
}

function explodeBullet(bullet) {
  const radius = bullet.explosionRadius || 0;
  explosions.push({ x: bullet.x, y: bullet.y, radius: 8, maxRadius: radius, grow: Math.max(4, radius / 10), life: 14 });
  addScreenShake(4, 12);
  playSound("explode");

  for (let j = enemies.length - 1; j >= 0; j--) {
    const enemy = enemies[j];
    const enemyCenterX = enemy.x + enemy.size / 2;
    const enemyCenterY = enemy.y + enemy.size / 2;
    const dx = enemyCenterX - bullet.x;
    const dy = enemyCenterY - bullet.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance <= radius) {
      if (enemy.type === "boss") {
        enemy.health -= bullet.bossSplashDamage || 1;
      } else {
        enemy.health -= bullet.splashDamage || 1;
      }

      if (enemy.health <= 0) {
        killEnemy(j);
      }
    }
  }
}

function checkBulletListCollisions(list) {
  for (let i = list.length - 1; i >= 0; i--) {
    const bullet = list[i];

    for (let j = enemies.length - 1; j >= 0; j--) {
      const enemy = enemies[j];

      if (bulletHitsEnemy(bullet, enemy)) {
        damageEnemy(enemy, bullet);

        if (bullet.explosive) {
          explodeBullet(bullet);
        }

        list.splice(i, 1);

        if (enemy.health <= 0 && enemies[j] === enemy) {
          killEnemy(j);
        }

        break;
      }
    }
  }
}

function damagePlayer(amount) {
  player.health -= amount;
  playSound("hit");
  addScreenShake(2, 8);
  playerFlashTimer = 12;
  lowHealthFlashTimer = 90;
}

function rectanglesOverlap(a, b) {
  return (
    a.x < b.x + b.size &&
    a.x + a.size > b.x &&
    a.y < b.y + b.size &&
    a.y + a.size > b.y
  );
}

function bulletHitsRusher(bullet, rusher) {
  return (
    bullet.x > rusher.x &&
    bullet.x < rusher.x + rusher.size &&
    bullet.y > rusher.y &&
    bullet.y < rusher.y + rusher.size
  );
}

function registerRusherTouch(index) {
  const rusher = enemies[index];
  if (!rusher || rusher.type !== "rusher") return false;

  const now = Date.now();
  if (now - rusher.lastTouch < 120) return false;

  rusher.lastTouch = now;
  rusher.touches = (rusher.touches || 0) + 1;
  const maxTouches = rusher.maxTouches || 2;
  const touchesLeft = Math.max(0, maxTouches - rusher.touches);
  addFloatingText(touchesLeft + "", rusher.x + rusher.size / 2, rusher.y - 6, "#ff9933");

  if (rusher.touches >= maxTouches) {
    createDeathParticles(rusher);
    enemies.splice(index, 1);
    return true;
  }

  return false;
}

function checkRusherExtraCollisions() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const rusher = enemies[i];
    if (!rusher || rusher.type !== "rusher") continue;

    for (let j = enemies.length - 1; j >= 0; j--) {
      if (i === j) continue;
      const other = enemies[j];
      if (!other || other.type === "rusher") continue;
      if (rectanglesOverlap(rusher, other)) {
        if (registerRusherTouch(i)) break;
      }
    }
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const rusher = enemies[i];
    if (!rusher || rusher.type !== "rusher") continue;

    for (let b = enemyBullets.length - 1; b >= 0; b--) {
      const bullet = enemyBullets[b];
      if (bulletHitsRusher(bullet, rusher)) {
        enemyBullets.splice(b, 1);
        if (registerRusherTouch(i)) break;
      }
    }
  }
}

function checkCollisions() {
  checkBulletListCollisions(bullets);
  checkBulletListCollisions(sidekickBullets);

  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];

    if (
      b.x > player.x &&
      b.x < player.x + player.size &&
      b.y > player.y &&
      b.y < player.y + player.size
    ) {
      damagePlayer(b.damage);
      if (b.flame) applyBurnToPlayer(100, 2);
      enemyBullets.splice(i, 1);
    }
  }

  const now = Date.now();

  for (let i = enemies.length - 1; i >= 0; i--) {
    const enemy = enemies[i];

    if (
      player.x < enemy.x + enemy.size &&
      player.x + player.size > enemy.x &&
      player.y < enemy.y + enemy.size &&
      player.y + player.size > enemy.y
    ) {
      if (enemy.type === "rusher") {
        if (now - enemy.lastTouch > 120) {
          damagePlayer(16);
          registerRusherTouch(i);
        }
        continue;
      }

      if (now - lastDamageTime > 900) {
        damagePlayer(enemy.type === "boss" ? 25 : enemy.type === "sniper" ? 14 : enemy.type === "burn" ? 13 : enemy.type === "elite" ? 16 : enemy.type === "miniboss" ? 22 : 10);
        lastDamageTime = now;
      }
    }
  }

  checkRusherExtraCollisions();

  if (player.health <= 0) {
    if (operationMode && operationCompleteTimer <= 0) failOperation();
    else if (!operationMode) setGameOver();
  }
}


function drawBackground() {
  ctx.fillStyle = "#243b2b";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 1;
  const grid = 55;
  for (let x = 0; x < canvas.width; x += grid) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += grid) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

function drawMenu() {
  clampShopScroll();
  buildMenuButtons();

  drawShopBackground();
  drawShopHeader();
  drawShopPanels();

  // START stays pinned at the top. The upgrade shop below it scrolls.
  for (let button of menuButtons) {
    if (button.fixed) drawButton(button);
  }

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, SHOP_TOP - 42, canvas.width, getShopBottom() - SHOP_TOP + 55);
  ctx.clip();

  drawShopSectionTitles();
  for (let button of menuButtons) {
    if (!button.fixed) drawButton(button);
  }

  ctx.restore();
  drawShopScrollBar();

  drawMenuControlsPanel();
  drawBuildMarker();
  drawSaveMessage();
  drawMenuCursor();
}

function drawBuildMarker() {
  ctx.save();
  ctx.textAlign = "right";
  ctx.fillStyle = "rgba(139, 238, 255, 0.7)";
  ctx.font = "11px Arial";
  ctx.fillText("BUILD: " + GAME_BUILD + " | CrazyGames guideline pass", canvas.width - 14, canvas.height - 10);
  ctx.restore();
}

function drawMenuCursor() {
  if (!["main", "menu", "operations", "lobby", "crosshair", "tutorial", "original"].includes(gameState)) return;

  // Draw our own bright cursor in the shop so it is always visible,
  // even if the browser cursor gets hidden by the canvas.
  ctx.save();
  ctx.shadowColor = "rgba(255, 255, 255, 0.9)";
  ctx.shadowBlur = 7;
  ctx.strokeStyle = "#ffffff";
  ctx.fillStyle = "#00e5ff";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(mouseX, mouseY);
  ctx.lineTo(mouseX, mouseY + 22);
  ctx.lineTo(mouseX + 7, mouseY + 17);
  ctx.lineTo(mouseX + 12, mouseY + 29);
  ctx.lineTo(mouseX + 17, mouseY + 27);
  ctx.lineTo(mouseX + 12, mouseY + 15);
  ctx.lineTo(mouseX + 21, mouseY + 15);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawShopBackground() {
  const pulse = Math.sin(Date.now() / 700) * 0.05;
  ctx.fillStyle = "#071018";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(0, 220, 255, " + (0.08 + pulse) + ")";
  ctx.lineWidth = 1;
  const grid = 44;
  const offset = Math.floor(Date.now() / 45) % grid;
  for (let x = -offset; x < canvas.width; x += grid) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = -offset; y < canvas.height; y += grid) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

function drawShopHeader() {
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";

  ctx.shadowColor = "#00e5ff";
  ctx.shadowBlur = 18;
  ctx.fillStyle = "#e8fbff";
  ctx.font = "bold 48px Arial";
  ctx.fillText("SKYFALL ARMORY", canvas.width / 2, 58);
  ctx.shadowBlur = 0;

  ctx.fillStyle = "#ffd34d";
  ctx.font = "bold 23px Arial";
  ctx.fillText("$ " + totalCoins, canvas.width / 2, 89);

  ctx.textAlign = "left";
}

function drawShopPanels() {
  const panelW = Math.min(920, canvas.width - 50);
  const panelX = canvas.width / 2 - panelW / 2;
  const panelY = SHOP_TOP - 42;
  const panelH = getShopBottom() - panelY + 8;

  ctx.fillStyle = "rgba(3, 14, 24, 0.86)";
  roundRect(panelX, panelY, panelW, panelH, 18);
  ctx.fill();

  ctx.strokeStyle = "rgba(0, 229, 255, 0.75)";
  ctx.lineWidth = 2;
  roundRect(panelX, panelY, panelW, panelH, 18);
  ctx.stroke();

  const colGap = 24;
  const colW = (panelW - colGap - 44) / 2;
  const leftX = panelX + 22;
  const rightX = leftX + colW + colGap;

  ctx.fillStyle = "rgba(255,255,255,0.04)";
  roundRect(leftX - 10, SHOP_TOP - 10, colW + 20, getShopBottom() - SHOP_TOP + 10, 14);
  ctx.fill();
  roundRect(rightX - 10, SHOP_TOP - 10, colW + 20, getShopBottom() - SHOP_TOP + 10, 14);
  ctx.fill();
}

function drawShopSectionTitles() {

function getButtonColors(category, hovering) {
  if (category === "start") return { fill: hovering ? "#15a85f" : "#0b7a44", stroke: "#6dffb2", glow: "#26ff91" };
  if (category === "weapon") return { fill: hovering ? "#143a74" : "#0b254f", stroke: "#4ea3ff", glow: "#2f89ff" };
  if (category === "rocket") return { fill: hovering ? "#6b3512" : "#3d1d0b", stroke: "#ff9b35", glow: "#ff7b00" };
  if (category === "sidekick") return { fill: hovering ? "#285b1e" : "#173713", stroke: "#72ff55", glow: "#45ff27" };
  if (category === "special") return { fill: hovering ? "#56326e" : "#301b44", stroke: "#d98cff", glow: "#c05cff" };
  return { fill: hovering ? "#26324a" : "#121b2c", stroke: "#00e5ff", glow: "#00e5ff" };
}

function drawButton(button) {
  if (gameState === "menu" && !isButtonInShopView(button)) return;

  const hovering =
    mouseX >= button.x &&
    mouseX <= button.x + button.w &&
    mouseY >= button.y &&
    mouseY <= button.y + button.h;

  const colors = getButtonColors(button.category, hovering);

  ctx.save();
  ctx.shadowColor = hovering ? colors.glow : "transparent";
  ctx.shadowBlur = hovering ? 16 : 0;

  ctx.fillStyle = colors.fill;
  roundRect(button.x, button.y, button.w, button.h, 10);
  ctx.fill();

  ctx.strokeStyle = colors.stroke;
  ctx.lineWidth = hovering ? 3 : 2;
  roundRect(button.x, button.y, button.w, button.h, 10);
  ctx.stroke();
  ctx.restore();

  const icon = button.category === "start" ? ">" : button.category === "weapon" ? "W" : button.category === "rocket" ? "R" : button.category === "sidekick" ? "S" : button.category === "special" ? "M" : "+";
  ctx.textBaseline = "alphabetic";

  if (button.centerText) {
    ctx.textAlign = "center";
    ctx.fillStyle = "#f4fbff";
    ctx.font = button.category === "start" ? "bold 19px Arial" : "bold 17px Arial";
    ctx.fillText(button.text, button.x + button.w / 2, button.y + 29);
    ctx.textAlign = "left";
    return;
  }

  ctx.textAlign = "left";
  ctx.fillStyle = colors.stroke;
  ctx.font = "bold 18px Arial";
  ctx.fillText(icon, button.x + 18, button.y + 27);

  ctx.fillStyle = "#f4fbff";
  ctx.font = button.category === "start" ? "bold 19px Arial" : "bold 16px Arial";
  ctx.fillText(button.text, button.x + 50, button.y + 27);
}

function drawPlayerHealthMeter() {
  const barW = 58;
  const barH = 9;
  const x = player.x + player.size / 2 - barW / 2;
  let y = player.y - 20;

  // If the player is near the top of the screen, keep the bar visible.
  if (y < 8) y = player.y + player.size + 8;

  const pct = Math.max(0, Math.min(1, player.health / player.maxHealth));

  ctx.save();
  ctx.shadowColor = "rgba(0, 255, 120, 0.45)";
  ctx.shadowBlur = 7;

  ctx.fillStyle = "rgba(0,0,0,0.82)";
  roundRect(x - 2, y - 2, barW + 4, barH + 4, 5);
  ctx.fill();

  ctx.fillStyle = "rgba(60,0,0,0.9)";
  roundRect(x, y, barW, barH, 4);
  ctx.fill();

  ctx.fillStyle = pct <= 0.2 ? "#ff2d2d" : pct <= 0.5 ? "#ffd34d" : "#00ff66";
  roundRect(x, y, barW * pct, barH, 4);
  ctx.fill();

  ctx.strokeStyle = "rgba(255,255,255,0.95)";
  ctx.lineWidth = 1;
  roundRect(x, y, barW, barH, 4);
  ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  let playerColor = "blue";
  const cx = player.x + player.size / 2;
  const cy = player.y + player.size / 2;
  ctx.save();
  ctx.shadowColor = dashTimer > 0 ? "#66ffff" : "#00aaff";
  ctx.shadowBlur = dashTimer > 0 ? 28 : 18;
  if (playerFlashTimer > 0) {
    playerColor = "#ff4da6";
    ctx.shadowColor = "#ff66cc";
  } else if (player.health <= player.maxHealth * 0.2) {
    if (Math.floor(Date.now() / 180) % 2 === 0) {
      playerColor = "#66d9ff";
      ctx.shadowColor = "#ff66cc";
      ctx.shadowBlur = 30;
    }
  }
  ctx.fillStyle = playerColor;
  ctx.fillRect(player.x, player.y, player.size, player.size);
  drawPlayerNickname();
  ctx.restore();
  ctx.strokeStyle = "rgba(120,230,255,0.8)";
  ctx.lineWidth = 2;
  ctx.strokeRect(player.x - 2, player.y - 2, player.size + 4, player.size + 4);
  drawPlayerHealthMeter();
}

function drawSidekicks() {
  for (let i = 0; i < sidekickCount; i++) {
    const pos = getSidekickPosition(i);
    ctx.fillStyle = "lime";
    ctx.fillRect(pos.x, pos.y, 18, 18);
  }
}

function drawEnemies() {
  for (let enemy of enemies) {
    const glow = enemy.isBurning ? "#ff7a00" : enemy.type === "boss" ? "#b000ff" : enemy.type === "elite" ? "#d46bff" : enemy.type === "burn" ? "#ff7a00" : enemy.type === "laser" ? "#ff1744" : enemy.type === "miniboss" ? "#ff0055" : enemy.type === "sniper" ? "#bb66ff" : "#ff2222";
    if (enemy.type === "sniper") {
      const ex = enemy.x + enemy.size / 2;
      const ey = enemy.y + enemy.size / 2;
      const px = player.x + player.size / 2;
      const py = player.y + player.size / 2;
      const timeToShot = enemy.reload - (Date.now() - enemy.lastShot);
      const flashing = timeToShot < 550 && Math.floor(Date.now() / 90) % 2 === 0;
      ctx.save();
      ctx.strokeStyle = flashing ? "rgba(255,0,0,0.95)" : "rgba(160,0,0,0.42)";
      ctx.lineWidth = flashing ? 4 : 2;
      ctx.shadowColor = "red";
      ctx.shadowBlur = flashing ? 15 : 5;
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(px, py);
      ctx.stroke();
      ctx.restore();
    }
    ctx.save();
    ctx.shadowColor = enemy.hitFlash > 0 ? "white" : glow;
    ctx.shadowBlur = enemy.hitFlash > 0 ? 25 : 16;
    if (enemy.hitFlash > 0) enemy.hitFlash--;

    if (enemy.type === "boss") {
      ctx.fillStyle = "purple";
      ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
    } else if (enemy.type === "sniper") {
      ctx.fillStyle = "black";
      ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
      ctx.strokeStyle = "#d98cff";
      ctx.lineWidth = 2;
      ctx.strokeRect(enemy.x, enemy.y, enemy.size, enemy.size);
    } else if (enemy.type === "rusher") {
      ctx.fillStyle = "#ff3333";
      ctx.beginPath();
      ctx.moveTo(enemy.x + enemy.size / 2, enemy.y);
      ctx.lineTo(enemy.x + enemy.size, enemy.y + enemy.size);
      ctx.lineTo(enemy.x, enemy.y + enemy.size);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.font = "bold 11px Arial";
      ctx.textAlign = "center";
      ctx.fillText((enemy.maxTouches || 2) - (enemy.touches || 0), enemy.x + enemy.size / 2, enemy.y + enemy.size * 0.7);
      ctx.textAlign = "left";
    } else if (enemy.type === "burn") {
      ctx.fillStyle = "#ff7a00";
      ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
      ctx.fillStyle = "#ffcc33";
      ctx.beginPath();
      ctx.moveTo(enemy.x + enemy.size / 2, enemy.y + 6);
      ctx.lineTo(enemy.x + enemy.size - 8, enemy.y + enemy.size - 8);
      ctx.lineTo(enemy.x + 8, enemy.y + enemy.size - 8);
      ctx.closePath();
      ctx.fill();
    } else if (enemy.type === "elite") {
      ctx.fillStyle = "#4d176b";
      ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
      ctx.strokeStyle = "#d46bff";
      ctx.lineWidth = 3;
      ctx.strokeRect(enemy.x, enemy.y, enemy.size, enemy.size);
    } else if (enemy.type === "splitter") {
      ctx.fillStyle = "#ff4d4d";
      ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
      ctx.fillStyle = "#111";
      ctx.fillRect(enemy.x + enemy.size/2 - 2, enemy.y + 5, 4, enemy.size - 10);
    } else if (enemy.type === "laser") {
      ctx.fillStyle = "#330010";
      ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
      ctx.strokeStyle = "#ff1744";
      ctx.lineWidth = 2;
      ctx.strokeRect(enemy.x, enemy.y, enemy.size, enemy.size);
    } else if (enemy.type === "miniboss") {
      ctx.fillStyle = "#7a0025";
      ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
      ctx.strokeStyle = "#ff3366";
      ctx.lineWidth = 3;
      ctx.strokeRect(enemy.x, enemy.y, enemy.size, enemy.size);
    } else {
      ctx.fillStyle = "red";
      ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
    }
    ctx.restore();

    const maxHp = enemy.type === "boss" ? bossMaxHealth : enemy.type === "miniboss" ? enemyBaseHealth + 12 + sidekickCount * 4 : enemy.type === "elite" ? enemyBaseHealth + 5 + sidekickCount * 2 : enemy.type === "burn" ? enemyBaseHealth + 2 + sidekickCount : enemy.type === "splitter" ? enemyBaseHealth + 3 + sidekickCount : enemy.type === "laser" ? enemyBaseHealth + 1 + sidekickCount : enemy.type === "rusher" ? 1 + Math.floor(enemyBaseHealth / 2) : enemy.type === "sniper" ? Math.max(1, enemyBaseHealth - 1) : enemyBaseHealth;
    const barW = enemy.size;
    const barH = enemy.type === "boss" || enemy.type === "miniboss" ? 8 : 5;
    ctx.fillStyle = "#222";
    ctx.fillRect(enemy.x, enemy.y - 10, barW, barH);
    ctx.fillStyle = enemy.type === "boss" && enemy.health < bossMaxHealth / 2 ? "#ff9933" : "#00ff66";
    ctx.fillRect(enemy.x, enemy.y - 10, Math.max(0, barW * (enemy.health / maxHp)), barH);
  }
}

function drawBullets() {
  ctx.lineCap = "round";
  for (let bullet of bullets) {
    ctx.strokeStyle = bullet.flame ? "rgba(255,90,0,0.45)" : bullet.explosive ? "rgba(255,170,50,0.45)" : "rgba(100,220,255,0.35)";
    ctx.lineWidth = bullet.flame ? 10 : 4;
    ctx.beginPath();
    ctx.moveTo(bullet.lastX || bullet.x, bullet.lastY || bullet.y);
    ctx.lineTo(bullet.x, bullet.y);
    ctx.stroke();
    ctx.fillStyle = bullet.color;
    ctx.beginPath();
    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
    ctx.fill();
  }
  for (let bullet of sidekickBullets) {
    ctx.strokeStyle = "rgba(0,255,100,0.35)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(bullet.lastX || bullet.x, bullet.lastY || bullet.y);
    ctx.lineTo(bullet.x, bullet.y);
    ctx.stroke();
    ctx.fillStyle = bullet.color;
    ctx.beginPath();
    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
    ctx.fill();
  }
  for (let bullet of enemyBullets) {
    ctx.strokeStyle = bullet.laser ? "rgba(255,0,70,0.65)" : bullet.flame ? "rgba(255,90,0,0.55)" : "rgba(255,70,40,0.38)";
    ctx.lineWidth = bullet.laser ? 8 : bullet.flame ? 9 : 4;
    ctx.beginPath();
    ctx.moveTo(bullet.lastX || bullet.x, bullet.lastY || bullet.y);
    ctx.lineTo(bullet.x, bullet.y);
    ctx.stroke();
    ctx.fillStyle = bullet.color || "#ff2b2b";
    if (!bullet.flame && !bullet.laser) {
      ctx.beginPath();
      ctx.moveTo(bullet.x, bullet.y - bullet.radius);
      ctx.lineTo(bullet.x + bullet.radius, bullet.y);
      ctx.lineTo(bullet.x, bullet.y + bullet.radius);
      ctx.lineTo(bullet.x - bullet.radius, bullet.y);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.lineCap = "butt";
}

function drawCoins() {
  const pulse = 1 + Math.sin(Date.now() / 160) * 0.12;
  for (let coin of coins) {
    ctx.save();
    ctx.shadowColor = "gold";
    ctx.shadowBlur = 12;
    ctx.fillStyle = "gold";
    ctx.beginPath();
    ctx.arc(coin.x, coin.y, (coin.size / 2) * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.65)";
    ctx.beginPath();
    ctx.arc(coin.x - 3, coin.y - 3, 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#5c4300";
    ctx.font = "bold 11px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("$", coin.x, coin.y + 0.5);
    ctx.restore();
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
  }
}

function drawHealthPacks() {
  for (let pack of healthPacks) {
    ctx.fillStyle = "white";
    ctx.fillRect(pack.x - pack.size / 2, pack.y - pack.size / 2, pack.size, pack.size);

    ctx.fillStyle = "#ff3333";
    ctx.fillRect(pack.x - 4, pack.y - pack.size / 2 + 4, 8, pack.size - 8);
    ctx.fillRect(pack.x - pack.size / 2 + 4, pack.y - 4, pack.size - 8, 8);
  }
}


function drawEffects() {
  for (let warn of laserWarnings) {
    const alpha = Math.max(0, warn.life / 32);
    ctx.strokeStyle = "rgba(255,0,70," + alpha + ")";
    ctx.lineWidth = 2 + Math.sin(Date.now()/70) * 1.5;
    ctx.beginPath();
    ctx.moveTo(warn.x, warn.y);
    ctx.lineTo(warn.x + warn.dx * 1500, warn.y + warn.dy * 1500);
    ctx.stroke();
  }
  for (let fire of fireSpots) {
    ctx.fillStyle = "rgba(255,100,0," + Math.max(0, fire.life / 30) + ")";
    ctx.beginPath();
    ctx.arc(fire.x, fire.y, fire.radius, 0, Math.PI * 2);
    ctx.fill();
  }
  for (let smoke of smokeParticles) {
    ctx.fillStyle = "rgba(180,180,180," + Math.max(0, smoke.life / 40) + ")";
    ctx.beginPath();
    ctx.arc(smoke.x, smoke.y, smoke.radius, 0, Math.PI * 2);
    ctx.fill();
  }
  for (let ex of explosions) {
    const alpha = Math.max(0, ex.life / 14);
    ctx.strokeStyle = "rgba(255,160,40," + alpha + ")";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.radius, 0, Math.PI * 2);
    ctx.stroke();
  }
  for (let p of deathParticles) {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  for (let t of floatingTexts) {
    ctx.fillStyle = t.color;
    ctx.font = "bold 18px Arial";
    ctx.textAlign = "center";
    ctx.fillText(t.text, t.x, t.y);
    ctx.textAlign = "left";
  }
}

function drawRadar() {
  if (isMobileScreen()) return;
  const w = 150;
  const h = 100;
  const x = canvas.width - w - 20;
  const y = 20;
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = "white";
  ctx.strokeRect(x, y, w, h);

  // Player dot moves on the radar in real time.
  const prx = x + ((player.x + player.size / 2) / canvas.width) * w;
  const pry = y + ((player.y + player.size / 2) / canvas.height) * h;
  ctx.fillStyle = "#00e5ff";
  ctx.fillRect(prx - 4, pry - 4, 8, 8);

  for (let enemy of enemies) {
    const enemyCenterX = enemy.x + enemy.size / 2;
    const enemyCenterY = enemy.y + enemy.size / 2;
    const rx = x + (enemyCenterX / canvas.width) * w;
    const ry = y + (enemyCenterY / canvas.height) * h;
    ctx.fillStyle = enemy.type === "boss" ? "purple" : enemy.type === "sniper" ? "white" : enemy.type === "rusher" ? "orange" : "red";
    ctx.fillRect(rx - 2, ry - 2, 4, 4);
  }
}

function drawCrosshair() {
  if (gameState !== "playing" || isTouchMode()) return;

  ctx.save();
  const color = getCrosshairColor();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = "rgba(255, 60, 60, 0.95)";
  ctx.shadowBlur = 9;

  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 9, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(mouseX - 17, mouseY);
  ctx.lineTo(mouseX - 5, mouseY);
  ctx.moveTo(mouseX + 5, mouseY);
  ctx.lineTo(mouseX + 17, mouseY);
  ctx.moveTo(mouseX, mouseY - 17);
  ctx.lineTo(mouseX, mouseY - 5);
  ctx.moveTo(mouseX, mouseY + 5);
  ctx.lineTo(mouseX, mouseY + 17);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}



function drawTouchControls() {
  if (!isTouchMode() || gameState !== "playing") return;
  const controls = getTouchControls();
  const joy = controls.joy;

function drawTutorialEnemy(type, x, y, size) {
  ctx.save();
  if (type === "soldier") {
    ctx.fillStyle = "#ff3333";
    ctx.fillRect(x, y, size, size);
  } else if (type === "sniper") {
    ctx.fillStyle = "#050505";
    ctx.fillRect(x, y, size, size);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, size, size);
  } else if (type === "rusher") {
    ctx.fillStyle = "#ff3333";
    ctx.beginPath();
    ctx.moveTo(x + size / 2, y);
    ctx.lineTo(x + size, y + size);
    ctx.lineTo(x, y + size);
    ctx.closePath();
    ctx.fill();
  } else if (type === "elite") {
    ctx.fillStyle = "#ff4dd2";
    ctx.fillRect(x, y, size, size);
    ctx.strokeStyle = "#fff";
    ctx.strokeRect(x, y, size, size);
  } else if (type === "burn") {
    ctx.fillStyle = "#ff8c1a";
    ctx.fillRect(x, y, size, size);
  } else if (type === "boss") {
    ctx.fillStyle = "purple";
    ctx.fillRect(x, y, size, size);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 18px Arial";
    ctx.textAlign = "center";
    ctx.fillText("BOSS", x + size / 2, y + size / 2 + 6);
  }
  ctx.restore();
}

function wrapText(text, x, y, maxWidth, lineHeight) {
  const words = String(text).split(" ");
  let line = "";
  ctx.textAlign = "left";
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + " ";
    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + " ";
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}
