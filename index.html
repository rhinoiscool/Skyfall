<!-- SKYFALL v44 -->
<!-- MOBILE TEST VERSION -->
<!-- Tutorial alignment fixed -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Skyfall v44</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #000814;
    font-family: Arial, sans-serif;
    touch-action: none;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background:
      linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px),
      #06111f;
    background-size: 40px 40px;
}

#tutorial {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    z-index: 10;
}

#tutorialBox {
    width: min(92vw, 900px);
    min-height: 420px;

    border: 3px solid #00e5ff;
    border-radius: 24px;

    background: rgba(0,20,30,0.95);

    padding: 30px;

    box-sizing: border-box;

    color: white;

    position: relative;

    overflow: hidden;
}

#tutorialTitle {
    text-align: center;
    color: gold;
    font-size: clamp(28px, 4vw, 52px);
    margin-bottom: 20px;
    text-shadow: 0 0 20px gold;
}

.step {
    display: none;
    font-size: clamp(18px, 2vw, 30px);
    line-height: 1.5;
    text-align: center;
    margin-top: 40px;
    padding-inline: 20px;
}

.step.active {
    display: block;
}

#startBtn {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);

    background: #00ff88;
    color: black;

    border: none;
    border-radius: 16px;

    padding: 18px 40px;

    font-size: 28px;
    font-weight: bold;

    cursor: pointer;

    display: none;
}

#titleWrap {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
}

#titleImage {
    width: min(1400px, 115vw);
    max-width: none;
}
</style>
</head>

<body>

<div id="titleWrap">
<img id="titleImage"
src="https://i.imgur.com/8QZ7Z9K.png">
</div>

<canvas id="game"></canvas>

<div id="tutorial">

<div id="tutorialBox">

<div id="tutorialTitle">
HOW TO PLAY
</div>

<div class="step active">
Move with WASD or Arrow Keys
</div>

<div class="step">
Aim with your mouse
</div>

<div class="step">
Click to shoot enemies
</div>

<div class="step">
Collect coins to buy stronger weapons and helpers
</div>

<div class="step">
Dash with SPACE to survive
</div>

<button id="startBtn">
START GAME
</button>

</div>
</div>

<script>

const steps = document.querySelectorAll(".step");
const startBtn = document.getElementById("startBtn");

let currentStep = 0;

function nextStep() {

    steps[currentStep].classList.remove("active");

    currentStep++;

    if(currentStep < steps.length) {

        steps[currentStep].classList.add("active");

    } else {

        startBtn.style.display = "block";

    }
}

setInterval(() => {

    if(currentStep < steps.length) {

        nextStep();

    }

}, 2500);

startBtn.onclick = () => {

    document.getElementById("tutorial").style.display = "none";

};

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);

resize();

let player = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    size: 25
};

function gameLoop() {

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ffff";

    ctx.beginPath();

    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);

    ctx.fill();

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
